front:
  text: 三輔黄圖卷之三
  hash: sha256:0f2d2533c9fc46e74ae2b9bd4794bd2a30e212af3b805a43335153ea9ae4da98
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0001_SBCK_003-1a}
body:
  text: 長樂未央建章北宫甘泉宫中宫室臺殿鴻䑓秦始皇二十七年築髙四十丈上起觀宇帝甞射飛鴻于䑓上故號鴻臺漢書惠帝四年長樂宫鴻臺災臨華殿在長樂宫前殿後武帝建漢書成帝永始四年長樂宫臨華殿災温室殿按漢宫殿䟽在長樂宫又漢宫閣記在未央宫長信宫漢太后常居之按通靈記大后成帝母也后宫在西秋之象也秋主信故宫殿皆以長信長秋爲名又永壽永寧殿皆后所處也成帝母王太后居長信宫右長樂宫宣室温室清涼皆在未央宫殿北宣明廣明皆在未央殿東昆徳玉堂皆在未央殿西宣室未央前殿正室也淮南子曰周武王殺紂於宣室漢取舊名也漢書曰文帝受釐宣室夜半前席賈生問鬼神之事即此也又王莽地皇四年城中少年朱弟張魚等燒宫莽避火宣室前殿火輙隨之温室殿武帝建冬處之温暖也西京雜記曰温室以椒塗壁𬒳之丈繡香桂爲柱設火齊屏風鴻羽帳規地以罽賔氍毹漢書曰孔光爲尚書令歸休與兄弟妻子燕語終不及朝省政事或問温室省中樹何木光不應漢書京房奏考功課吏法上令公卿朝臣㑹議温室清凉殿夏居之則清凉也亦曰延凊室漢書曰清室則中夏含霜即此也董偃常卧延清之室以畫石爲牀文如錦紫琉璃帳以紫玉爲盤如屈龍皆用雜寳飾之侍者於外扇偃偃曰玉石豈須扇而後凉邪又以玉晶爲盤貯氷於膝前玉晶與氷同㓗侍者謂氷無盤必融濕席乃拂玉盤墜氷玉俱碎玉晶千塗國所貢也武帝以此賜偃麒麟殿未央宫有麒麟殿漢書哀帝燕董賢父子於麒麟殿視賢曰吾欲法尭禪舜如何王閎曰天下乃髙皇帝天下非陛下之天下也陛下奉承宗廟當傳之無窮安可妄有所授帝業至重天子無戯言上黙然不恱金華殿未央宫有金華殿漢書曰成帝𥘉方向學召鄭寛中張禹說尚書論語於金華殿中承明殿未央宫有承明殿著述之所也班固西都賦序云内有承明著作之庭即此也漢書武帝謂嚴助曰君厭承明之廬又成帝鴻嘉二年雉飛集承明殿屋蒼龍白虎朱雀玄武天之四靈以正四方王者制宫闕殿閣取法焉掖庭宫在天子左右如肘膝椒房殿在未央宫以椒和泥塗取其温而芬芳也武帝時後宫八區有昭陽飛翔増成合歡蘭林披香鳯皇鴛鴦等殿後有増修安處常寧茞若椒風發越蕙草等殿爲十四位成帝趙皇后居昭陽殿號飛燕以其體輕也有女弟俱爲婕妤貴傾後宫昭陽舎蘭房椒壁其中庭彤朱而庭上髹漆切皆銅沓切門限也黄金塗白玉堦壁帶往往爲黄金釭函藍田壁明珠翠羽飾之自後宫未甞有焉班婕妤居增成舎後宫八區增成第三區也哀帝時董賢女弟爲昭儀居舎號曰椒風髙門殿漢書曰汲黯請見髙門注曰未央宫髙門殿也又哀帝時鮑宣諌曰陛下擢臣巖穴誠兾有益毫毛豈欲臣美食大官重髙門之地非常室漢書成帝綏和二年鄭通里人王褒絳衣小冠帶劒入北司馬門殿東門上前殿至非常室中殿上室名解帷組結佩之召前殿署長業等曰天帝令我居此業等収縳考問乃故公車大誰卒病狂易不自知入宫下獄死大誰者主問非常之人誰以誰何称因用爲官名有大誰長令此卒者長所領士卒也狂易謂病狂而変易其常也織室在未央宫又有東西織室織作文繡郊廟之服有令史凌室在未央宫藏氷之所也豳詩七月篇曰納于凌隂周官凌人職掌藏氷大祭祀飲食則供氷漢書惠帝四年織室凌室災暴室主掖庭織作染練之署謂之暴室取暴曬爲名耳有嗇夫官屬弄田在未央宫弄田者燕遊之田天子所戯弄耳漢書昭帝紀曰始元元年上耕于鈎盾弄田應劭注云帝時年九嵗未能親耕帝籍鈎盾官宦者近署故往試耕爲戯弄成帝建始三年小女陳持弓年九嵗闌入尚方掖門至未央殿鈎盾禁中内謁者署在未央宫屬少府續漢書云掌宫中歩帳褻物丁孚漢官云令秩千石金馬門宦者署武帝時大宛馬以銅鑄像立於署門因以爲名東方朔主父偃嚴安徐樂皆待詔金馬門即此路軨廐在未央宫中掌宫中輿馬亦曰未央廐漢書曰武帝時期門郎上官桀遷爲未央廐令右未央宫駘蕩宫春時景物駘蕩滿宫中也馺娑宫馺娑馬行疾貌馬行迅疾一日之間遍宫中言宫之大也枍詣宫枍詣木名宫中美木茂盛也天梁宫梁木至於天言宫之高也四宫皆在建章宫竒華殿在建章宫旁四海夷狄器服珍寳火浣布切玉刀巨象大雀師子宫馬充塞其中鼓簧宫漢宫閣䟽云鼓簧宫周匝一百三十歩在建章宫西北神明臺漢書曰建章有神明䑓廟記曰神明䑓武帝造祭仙人處上有承露盤有銅仙人舒掌捧銅盤玉杯以承雲表之露以露和玉屑服之以求仙道長安記仙人掌大七圍以銅爲之魏文帝徙銅盤折聲聞数十里右建章宫夀宫北宫有神仙宫夀宫張羽旗設供具以禮神君神君來則肅然風生帷帳皆動明光宫武帝太初四年秋起在長樂宫後南與長樂宫相連屬漢書元后傳曰成都侯啇甞疾欲避暑從上借明光宫盖即此王莽建國元年改明光宫爲安舘安定太后居之太子宫甲觀太子宫有甲觀畫堂漢書注曰甲者甲乙丙丁之次也漢書曰孝成皇帝元帝太子也母曰王皇后元帝在太子宫生甲觀畫堂元后傳曰見於丙殿此其例也畫堂謂宫殿中彩畫之堂右北宫鈎弋宫列仙傳曰鈎弋夫人姓趙氏河間人少好酒病卧六年右手鈎卷飲食少望氣者云東北有貴人推而得之見召姿色佳麗武帝反其手得玉鈎而手展有寵生昭帝姙娠十四月上曰聞昔堯十四月而生今鈎弋亦然乃命所生門曰堯母門所居曰鈎弋宫自夫人加婕妤後得罪掖庭獄死及殯香一月昭帝即位追尊爲皇太后更葬之發六十二萬人起陽陵其棺櫬但有彩履王襃雲陽記曰鈎弋夫人從至甘泉而卒尸香聞十餘里葬雲陽武帝思之起通靈䑓於甘泉宫有一青鳥集䑓上往來至宣帝時乃不至漢武故事曰鈎弋宫在直門之南昭䑓宫在上林苑中孝宣霍皇后立五年廢處昭䑓宫後十二歳徙雲林舘乃自殺長定宫林光宫中有長定宫三輔决録曰后從帝行幸於甘泉宫居長定宫孝成許皇后廢處昭䑓宫歳餘徙長定宫長門宫離宫在長安城孝武陳皇后得幸頗妬居長門宫永信宫孝哀帝尊㳟皇太后曰帝太太后稱永信宫中安宫孝哀帝尊㳟皇太后曰帝太后稱中安宫儲元宫在長安城西漢書外戚傳曰信都太后與信都王俱居儲元宫犬䑓宫在上林苑中長安西二十八里漢書江充召見犬䑓宫葡萄宫在上林苑西漢哀帝元壽三年單于來朝以太歳厭勝所舎之此宫歩壽宫秦亦有歩壽宫今按其地與秦異則秦漢各有歩壽宫耳漢祋祤宫宣帝神爵二年鳯凰集祋祤縣鳯凰集處得玉寳乃起歩壽宫梁山宫梁山好畤界即禹貢云壷口治梁及𡵨又古公踰梁山于岐下及秦立梁山宫皆北山下也史記秦本紀始皇三十二年幸梁山宫即此也黄山宫在興平縣西三十里武帝微行西至黄山宫即此也回中宫史記秦始皇二十七年廵隴西北地出笄頭過回中漢書文帝十四年匈奴入蕭關殺都尉燒回中宫侯騎至雍武帝元狩四年幸雍通回中道遂北出蕭關又有三良宫相近集靈宫集仙宫存仙殿存神殿望仙䑓望仙觀俱在華隂縣界皆武帝宫觀名也華山記及三輔舊事云昔有太元眞人茅盈内記始皇三十一年九月庚子盈曽祖父𪷟於華山乗雲駕龍白日昇天先是邑人謡曰神仙得者茅𥘉成駕龍上昇入太清時下玄州戯赤城繼丗而往在我盈帝若學之臘嘉平漢武帝内傳曰魯女生長樂人𥘉餌胡麻乃永絶榖八十餘年少壯色如桃華一日與親知故人别入華山後五十年先識者逢女於廟前乗白鹿從王母人因識之謝其郷里而去又神仙傳曰中山衛叔卿常乗雲車駕白鹿見漢武帝將臣之叔卿不言而去武帝悔求得其子度令追其父登華岳見父與數人坐於石上敕度令還又華山記弘農鄧紹八月曉入華山見童子執五綵嚢盛栢葉露食之武帝即其地造宫殿歳時祈禱焉漢書云華隂縣有集靈宫又有望仙觀在華隂縣棠棃宫在甘泉苑垣外雲陽南三十里竹宫甘泉祠宫也以竹爲宫天子居中漢舊儀云竹宫去壇三里宜春宫本秦之離宫在長安城東南杜縣東近下杜扶荔宫在上林苑中漢武帝元鼎六年破南越起扶荔宫宫以荔枝得名以植所得竒草異木菖蒲百本山薑十本甘蕉十二本留求子十夲桂百本宻香指甲花百本龍眼荔枝檳榔橄㰖千嵗子甘橘皆百餘夲上木南北異宜歳時多枯瘁荔枝自交趾移植百株于庭無一生者連年猶移植不息後數歳偶一株稍茂終無華實帝亦珍惜之一旦萎死守吏坐誅者數十人遂不復蒔矣其實則歳貢焉郵傳者疲斃於道極爲生民之患至後漢安帝時交趾郡守極陳其弊遂罷其貢五柞宫漢之離宫也在扶風盩厔宫中有五柞樹因以爲名五柞皆連抱上枝覆䕃數􅒪宣曲宫在昆明池西孝宣帝暁音律常於此度曲因以爲名鼎湖宫在湖城縣界又一說在蓝田有亭昔黃帝採首山銅以鑄鼎鼎成有龍下迎帝仙去小臣攀龍髯而上者七十二人漢武帝於此建宫思子宫武帝寤戾太子無辜𬒳殺作思子宫爲歸來望思之䑓於湖萬歳宫武帝造汾隂有萬歳宫宣帝元康四年幸萬歳宫神爵翔集以元康五年爲神爵紀元首山宫漢武帝元封元年封禪後夢髙祖坐明堂朝羣臣於是祀髙祖於明堂以配天還作首山宫以爲髙靈舘明光宫武帝求仙起明光宫發燕趙美女二千人充之率取二十以下十五以上年滿三十者出嫁之掖庭令惣其籍時有死出者隨𥙷之池陽宫在池陽南上原之阪有長年阪去長安五十里養德宫趙王如意年㓜未能就外傳戚姬使舊趙王内傳趙媪傳之號其室曰養徳宫右甘泉宫日華宫河間獻王徳築日華宫置客舘二十餘區以待學士自奉養甚薄不踰賓客曜華宫梁孝王好營宫室苑囿之樂作曜華宫築兎園園中有百靈山有膚寸石落猿巖栖龍岫又有鴈池池間有鶴洲鳬渚其諸宫觀相連延亘數十里竒果異樹珍禽怪獸畢有王日與宫人賓客弋釣其中右日華曜華宫營構不在三輔然皆漢之諸王所建以附宫室篇末
