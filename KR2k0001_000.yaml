body:
  text: 右三輔黃圖撫州州學刻也是書載秦漢宮室苑囿為甚備顔師古漢書新注多取焉然不載撰者名氏唐書藝文志有三輔黃圖一卷列于地理類之首亦不云何人作也其間多困應劭漢書集解劭後漢建安時人至魏人如淳注漢書𣸪引此圖以為據以此考之得非漢魏閒人所作邪丗無板刻傳寫多魯魚之謬凡淂數本以相參校其或未有證據疑以傳疑不敢斷以臆說云時紹興癸酉七月朔旦左迪㓛郎學教授苗昌言題三輔黃圖目録卷之一三輔㳂革三輔治所京兆馮翊扶風咸陽故城秦宫馳道閣萯陽宫棫陽宫西垂宫平陽封宫橐泉宫步高宫步夀宫虢宫長楊宫蘄年宫梁山宫信宫興樂宫朝宫阿房宫蘭池宫鐘宫雲閣望夷宫林光宫漢長安故城秦漢風俗都城十二門霸城門清明門宣平門覆盎門鼎路門便門章城門直城門雍門洛門厨城門橫門卷之二長安九市長安八街長安城中閭里漢宫長樂宫未央宫建章宫桂宫北宫甘泉宫卷之三長樂宫鴻臺殿臨華殿溫室殿長信宫未央宫宣室殿溫室殿清凉殿宣明殿廣明殿昆德殿玉堂殿麒麟殿金華殿承明殿掖庭宫椒房殿昭陽殿飛翔殿增成殿合歡殿蘭林殿披香殿鳯凰殿鴛鴦殿安處殿常寧殿茞若殿椒風殿發越殿蕙草殿髙門殿非常殿織室凌室暴室弄田內謁者署金馬門路軨廄建章宫駘蕩宫馺娑宫天梁宫枍詣宫竒華殿鼓簧宫神明臺北宫夀宫明光宫太子宫中甲觀畫堂甘泉宫鈎弋宫昭臺宫長定宫長門宫永信宫中安宫儲元宫大臺宫葡萄宫步夀宫梁山宫黃山宫回中宫三良宫集靈宫集仙宫存仙殿存神殿望仙臺望仙觀棠梨宫竹宫宜春宫扶荔宫五柞宫宣曲宫鼎湖宫思子宫萬歲宫首山宫明光宫池陽宫養德宫日華宫曜華宫此二宫不在三輔卷之四苑囿周靈囿漢上林苑甘泉苑御宿苑思賢苑博望苑西郊苑三十六苑樂游苑宜春下苑梨園池沼周靈沼漢昆明池鎬池滄池太液池唐中池百子池十池在上林苑佽飛外池秦酒池影娥池琳池鶴池冰池卷之五臺榭周靈臺漢靈臺柏梁臺漸臺神明臺通天臺凉風臺魚池臺酒池臺著室臺鬪雞臺走狗臺壇臺韓信射臺果臺東西山臺鉤弋臺通靈臺望鵠臺眺瞻臺桂臺商臺避風臺長楊榭辟雍周辟雍漢辟雍明堂周明堂漢明堂圜丘太學宗廟太上皇廟高祖廟高園原廟惠帝廟文帝廟景帝廟武帝廟昭帝廟宣帝廟元帝廟成帝廟寢廟園新室九廟南北郊天郊地郊甘泉圜丘后土汾隂社稷官社官稷觀樓館豫章觀飛廉觀屬玉觀青梧觀射熊觀石闕觀封巒觀白楊觀長平觀龍臺觀涿沐觀細柳觀成山觀仙人觀霸昌觀蘭池觀安臺觀淪沮觀禁觀董賢觀蒼龍觀當市觀旗亭樓馬伯騫樓麒麟館朱雀館龍興館含章館卷之六閣石渠閣天祿閣麒麟閣未央宫堯閣白虎閣屬車閣署虎威章溝八瑩庫武庫靈金內府倉大倉細柳倉嘉倉廄未央大廄六廄九廄霸昌馬廄都廄中廄圈秦獸圈漢獸圈虎圈橋橫橋渭橋霸橋便門橋飲馬橋陵墓漢十五陵王莽妻億年陵雜録禁中省中鹵簿清道靜室離宫行在所陛下繭館𧖟室鍾室作室長安御溝闕觀孰城掖門闈闥永巷蠻夷郎關中八水三輔黃圖目録畢
