front:
  text: 三輔黃圖序易曰上古穴居而野處後丗聖人易之以宫室上棟下宇以待風雨蓋取諸大壯三代盛時未聞宫室過制秦穆公居西秦以境地多良材始大宫觀戎使由余適秦穆公示以宫觀由余曰使鬼爲之則勞神矣使人爲之則苦人矣是則穆公時秦之宫室巳壯大矣惠文王初都咸陽取岐雍巨材新作宫室南臨渭北踰涇至於離宫三百復起阿房未成而亡至始皇并滅六國慿藉富彊益爲驕侈殫天下財力以事營繕項羽入關燒秦宫闕三月火不滅漢高祖有天下始都長安寔曰西京欲其子孫長安都於此也長安本秦之郷名髙祖作都至孝武皇帝承文景菲薄之餘恃邦國阜繁之資土木之役倍秦越舊斤斧之聲畚鍤之勞歲月不息蓋騁其邪心以夸天下也昔孔子作春秋築一臺新一門必書于經謹其廢農時奪民力也今裒採秦漢以來宫殿門闕樓觀池苑在關輔者著于篇曰三輔黃圖云東都不與焉
