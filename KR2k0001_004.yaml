front:
  text: 三輔黃圗卷之四
  hash: sha256:e137a9de7a60f5c5866dcce7b57adbfe7c012f98394294e5b3b4b64728c45dbb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0001_SBCK_004-1a}
body:
  text: 苑囿周靈囿文王囿也詩曰王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯毛萇注云囿所以域養禽獸也天子百里諸侯四十里靈者言文王之有靈德也靈囿言道行於苑囿也孟子曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同其利也文王靈囿在長安縣西四十二里漢上林苑即秦之舊苑也漢書云武帝建元三年開上林苑東南至藍田冝春鼎湖御宿昆吾旁南山而西至長楊五柞北繞黃山瀕渭水而東周袤三百里離宫七十所皆容千乘萬騎漢宫殿疏云方三百四十里漢舊儀云上林苑方三百里苑中養百獸天子秋冬射獵取之帝初修上林苑群臣逺方各獻名果異卉三千餘種植其中亦有製為美名以標竒異茂陵富民袁廣漢藏鏹巨萬家僮八九百人於北山下築園東西四里南北五里激流水注其中構石為山髙十餘丈連延數里養白鸚鵡紫鴛鴦犛牛青兕竒獸珍禽委積其間積沙為洲嶼激水為波濤致江鷗海鶴孕雛産鷇延漫林池竒樹異草靡不培植屋皆徘徊連屬重閣修廊行之移晷不能遍也廣漢後有罪誅沒入為官園鳥獸草木皆移入上林苑中上林苑有昆明觀武帝置又有繭觀平樂觀逺望觀燕升觀觀象觀便門觀白鹿觀三爵觀陽祿觀隂德觀鼎郊觀樛木觀椒唐觀魚烏觀元華觀走馬觀柘觀上蘭觀郎池觀當路觀皆在上林苑又舊儀曰上林有令有尉禽獸簿記其名數又有上林詔獄主治苑中禽獸官館之事屬水衡又上林苑中有六池市郭宫殿魚臺犬臺獸圈甘泉苑武帝置緣山谷行至雲陽三百八十一里西入扶風凡周回五百四十里苑中起宫殿臺閣百餘所有仙人觀石闕觀封巒觀鳷鵲觀御宿苑在長安城南御宿川中漢武帝為離宫別館禁禦人不得入往來遊觀止宿其中故曰御宿三秦記云御宿園出栗十五枚一勝大梨如五勝落地則破其取梨先以布囊承之號曰含消此園梨也思賢苑孝文帝為太子立思賢苑以招賔客苑中有堂室六所客館皆廣廡髙軒屏風幃褥甚麗廣陵王胥有勇力常於別囿學格熊後遂能空手搏之莫不絶脰後為獸所傷陷腦而死博望苑武帝立子據為太子為太子開博望苑以通賔客漢書曰武帝年二十九乃得太子甚喜太子冠為立博望苑使之通賔客從其所好又云博望苑在長安城南杜門外五里有遺址西郊苑漢西郊有苑囿林麓藪澤連亘繚以周垣四百餘里離宫別館三百餘所三十六苑漢儀注大僕牧師諸苑三十六所分布北邊西邊以郎為苑監宦官奴婢三萬人養馬三十萬匹養鳥獸者通名為苑故謂之牧馬處為苑樂遊苑在杜陵西北宣帝神爵三年春起宜春下苑在京城東南隅元帝紀注東南隅曲池是梨園雲陽宫記曰雲陽車箱坂下有梨園一頃梨數百株青翠繁密望之如車蓋池沼周文王靈沼在長安西三十里詩曰王在靈沼於牣魚躍漢昆明池武帝元狩四年穿在長安西南周回四里西南夷傳曰天子遣使求身毒國市竹身毒國即天竺也漢書曰張騫言使大夏時見蜀布卭竹杖問所從來曰從東來身毒國可數千里得蜀賈人市而為昆明所閉天子欲伐之越嶲昆明國有溟池方三百里故作昆明池以象之以習水戰因名曰昆明池漢書曰元狩三年減隴西北地上郡戍卒之半及吏弄法者謫之穿此池食貨志曰時越欲與漢用船戰逐水戰相逐也乃大修昆明池也三輔舊事曰昆明池地三百三十二頃中有戈船各數十樓船百艘船上建戈矛四角悉垂幡旄葆麾蓋照燭涯涘圖曰上林苑有昆明池周匝四十里廟記曰池中後作豫章大船可載萬人上起宫室因欲遊戲養魚以給諸陵祭祀餘付長安厨三輔故事又曰池中有豫章臺及石鯨刻石為鯨魚長三丈每至雷雨常鳴吼鬛尾皆動一説甘泉宫南有昆明池池中有靈波殿皆以桂為殿柱風來自香又曰池中有龍首船常令宫女泛舟池中張鳯蓋繡鳯為飾建華旗作棹歌棹歌棹發歌也又曰棹歌謳舟人歌也雜以鼓吹帝御豫章觀臨觀焉關輔古語曰昆明池中有二石人立牽牛織女於池之東西以象天河張衡西京賦曰昆明靈沼黑水玄址牽牛立其右織女居其左今有石父石婆神祠在廢池疑此是也武帝初穿池得黑土帝問東方朔東方朔曰西域胡人知乃問胡人胡人曰劫燒之餘灰也三秦記曰昆明池中有靈沼名神池云堯時治水嘗停船於此池通白鹿原原人釣魚綸絶而去夢於武帝求去其鈎三日戲於池上見大魚㗸索帝曰豈不穀昨所夢邪乃取鈎放之間三日帝復遊池池濱得明珠一雙帝曰豈昔魚之報邪鎬池在昆明池之北即周之故都也廟記曰長安城西有鎬池在昆明池北周匝二十二里溉地三十三頃史記曰秦始皇帝三十六年使者從關東夜至華隂縣平舒道有人持璧遮使者曰為吾遺鎬池君因言曰今年祖龍死使者問其故忽不見置其璧去使者奉璧具以聞始皇默然良久曰山鬼不過知一歲事退言曰祖龍者人之先也祖始也龍者人主之象謂始皇也使御府視璧乃二十八年渡江所沉璧也滄池在長安城中舊圖云未央宫有滄池言池水蒼色故曰滄池太液池在長安故城西建章宫北未央宫西南大液者言其津潤所及廣也關輔記云建章宫北有池以象北海刻石為鯨魚長三丈漢書曰建章宫北治大池名曰太液池中起三山以象瀛洲蓬萊方丈刻金石為魚龍竒禽異獸之屬瀛洲一名魂洲亦曰澴洲有樹名影木月中視之如列星万歲一實食之輕骨上有枝葉如華蓋群仙以避風雨有金鑾之觀飾以環玉直上於雲中有青瑶瓦覆之以雲紈之素刻碧玉為倒龍之狀懸火精為日刻黑玉為鳥以水精為月青瑤為蟾兔於地下為機戾以側昏明不虧弦望有香風冷然而至有草名藝苗狀如菖蒲食葉則醉食根則醒有鳥如鳯身紺翼丹名曰藏珠每鳴翔而吐珠纍斛仙人以珠飾仙裳蓋輕而耀於日月也蓬萊山亦名防丘亦名雲來高二万里廣七万里水淺有細石如金玉得之不加陶冶自然光淨仙者服之東有鬱夷國時有金霧諸仙説北上常浮轉低卬有如山上架樓室向明以開户牖及霧歇滅户皆向北有浮雲之幹葉青莖紫子大如珠有青鵉集其上下有砂䃯細如粉柔風至葉條翻起拂細砂如雲霧仙者來觀而戲焉風吹竹葉聲如鍾磬方丈之山一名巒維東方龍場方千里瑤玉為林雲色皆紫上有通霞臺西王母常遊於其上常有鵉鳯鼓舞如琴瑟和鳴三山統名崑丘亦曰神山上有不死之藥食之輕舉武帝信仙道取少君欒大妄誕之語多起樓觀故他中立三山以象蓬萊瀛洲方丈廟記曰建章宫北池名太液周回十頃有採蓮女鳴鶴之舟又按三輔舊事云日出暘谷浴於咸池至虞淵即暮此池象之也昭帝始元元年春黃鵠下建章宫太液池成帝常以秋日與趙飛燕戲於太液池以沙棠木為舟沙棠木造舟不沉溺以雲母飾於鷁首一名雲舟又刻大桐木為虬龍雕飾如真夾雲舟而行以紫桂為柁枻及觀雲棹之玩擷菱蕖帝每憂輕蕩以驚飛燕命佽飛之士以金鎖纜雲舟於波上每輕風時至飛燕殆欲隨風入水帝以翠縷結飛燕之𥚑常恐曰妾微賤何復得預結纓𥚑之遊今太液池尚有避風臺即飛燕結𥚑之處唐中池周回十二里在建章宫太液池之南百子池戚夫人侍兒賈佩蘭後出為扶風人假儒妻説在宫內時見戚夫人侍髙祖嘗以趙王如意為言而髙祖思之幾半日不言歎息悽愴而未知其術使夫人擊築髙祖歌大風以和之七月七日臨百子池作于闐樂樂闋以五色縷相羈謂之相連愛八月四日出雕房北户竹下圍棊勝者終年有福負者終年疾病取絲縷就北斗星辰求長命乃免正月上辰出池邊盥濯食蓬餌以祓妖邪三月上巳張樂於池上十池上林苑有𥘉池麋池牛首池蒯池積草池東陂池西陂池當路池大臺池郎池牛首池在上林苑中西頭蒯池生蒯草以織席西陂池郎池皆在古城南上林苑中陂郎二水名因為池積草池中有珊瑚樹髙一丈二尺一本三柯上有四百六十二條南越王趙他所獻號為烽火樹至夜光景常煥然少府佽飛外池漢儀注佽飛具繒繳以射鳬鴈給祭祀故有池秦酒池在長安故城中廟記曰長樂宫中有魚池酒池池上有肉炙樹秦始皇造漢武行舟於池中酒池北起臺天子於上觀牛飲者三千人又曰武帝作以夸羌胡飲以鐡杯重不能舉皆抵牛飲西征賦云酒池監於啇辛追覆車而不悟影蛾池武帝鑿池以玩月其旁起望鵠臺以眺月影入池中使宫人乘舟弄月影名影蛾池亦曰眺蟾臺琳池昭帝元始元年穿琳池廣千步池南起桂臺以望逺東引大液之水池中植分枝荷一莖四葉狀如駢蓋日照則葉低蔭根莖若葵之衛足名曰低光荷實如玄珠可以飾佩花葉難萎芬馥之氣徹十餘里食之令人口氣常香益脈治病宫人貴之每遊燕出入必皆含嚼或剪以為衣或折以障日以為戲弄帝時命水嬉遊燕永日士人進一豆糟帝曰桂楫松舟其猶重朴况乎此槽可得而乘耶乃命以文梓為船木蘭為柂刻飛燕翔鷁飾於船首隨風輕漾畢景忘歸起商臺於池上鶴池在長安城西盤池在西北並廢氷池在長安西舊圖云西有彪池亦名聖女泉蓋氷彪聲相近傳説之訛也三輔黃圗卷第四
