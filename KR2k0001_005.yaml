front:
  text: 三輔黄圗卷之五
  hash: sha256:782f72be944cd175050e9ec839433bd807149c8a848854bf7a1d2a8fb5f4e366
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0001_SBCK_005-1a}
body:
  text: 臺榭周文王靈臺在長安西北四十里詩序曰靈臺民始附也文王受命而人樂其有靈德以及鳥獸昆蟲焉鄭玄注云天子有靈臺者所以觀祲象察氛祥也文王受命而作邑于豐立靈臺詩曰經始靈臺庶民子來經之營之不日成之劉向新序云周文王作靈臺及爲池沼掘得死人之骨吏以聞于文王文王曰更葬之吏曰此無主矣文王曰有天下者天下之主有一國者一國之主寡人者死人之主又何求主遂令吏以衣棺更葬之天下聞之皆曰文王賢矣澤及枯骨又况於人乎周靈臺髙二丈周回百二十歩漢靈臺在長安西北八里漢始曰清臺本爲候者觀隂陽天文之變更名曰靈臺郭延生述征記曰長安宫南有靈臺高十五仭上有渾儀張衡所制又有相風銅烏遇風乃動一曰長安靈臺上有相風銅烏千里風至此烏乃動又有銅表髙八尺長一丈三尺廣尺二寸題云太𥘉四年造栢梁臺武帝元鼎二年春起此臺在長安城中北關内三輔舊事云以香栢爲梁也帝甞置酒其上詔群臣和詩能七言詩者乃得上太𥘉中臺災漸臺在未央宫太液池中髙十丈漸浸也言爲池水所漸又一說漸臺星名法星以爲䑓名未央宫有滄地池中有漸䑓王莾死於此神明臺見建章宫通天臺武帝元封二年作甘泉通天臺漢舊儀云通天者言此臺髙通于天也漢武故事築通天臺於甘泉去地百餘丈望雲雨悉在其下望見長安城武帝時祭㤗乙上通天臺舞八歲童女三百人祠祀招仙人祭㤗乙云令人升通天臺以候天神天神旣下祭所若大流星乃舉烽火而就竹宫望拜上有承露盤仙人掌擎玉杯以承雲表之露元鳯間自毀椽桷皆化爲龍鳯從風雨飛去西京賦云通天眇而竦峙徑百常而莖擢上瓣華以交紛下刻陗其若削亦曰侯神臺又曰望仙臺以候神明望神仙也凉風臺在長安故城西建章宫北關輔記曰建章宫北作凉風臺積水爲樓長樂宫有魚池臺酒池臺秦始皇造又有著室臺闘雞臺走狗臺壇臺漢韓信射臺又未央有果臺東西山二臺未央宫有鈎弋臺通靈臺見宫門望鵠臺眺蟾臺桂臺啇臺避風臺並見池沼門長楊榭在長楊宫秋冬較獵其下命武士搏射禽獸天子登此以觀焉臺上有木曰榭辟廱周文王辟廱在長安西北四十里亦曰璧廱如璧之圎雍之以水象教化流行也詩曰於論鼔鍾於樂辟廱毛萇注云論思也水旋丘如辟廱以節觀者鄭玄注云文王作靈臺而知人之歸附作靈沼靈囿而知鳥獸之得其所以爲音聲之道與政通故合樂以詳之漢辟廱在長安西北七里漢書河間獻王來朝獻雅樂武帝對之三雍宫即此禮樂志曰成帝時犍爲郡水濱得古磬十六枚劉向說帝冝興辟廱焉明堂周明堂明堂所以正四時出教化天子布政之宫也黃帝曰合宫尭曰衢室舜曰緫章夏后曰丗室殷人曰陽舘周人曰明堂先儒舊說其制不同或曰明堂在國之陽大戴禮云明堂九室一室有四户八牖凡三十六户七十二牖以茅蓋屋上圎下方援神契曰明堂上圎下方八䆫四牖考工記云明堂五室稱九室者取象陽數也八牖者隂數也取象八風三十六户牖取六甲之爻六六三十六也上圎象天下方法地八䆫即八牖也四闥者象四時四方也五室者象五行也皆无明文先儒以意釋之耳禮記明堂位曰朝諸侯于明堂之位天子負斧依南郷而立明堂也者明諸侯之尊卑也制禮作樂頒度量而天下服知明堂是布政之宫也又孝經曰宗祀文王於明堂以配上帝則周有明堂也明矣漢明堂在長安西南七里漢書曰武帝𥘉即位嚮儒術以文學爲本議立明堂於城南以朝諸侯應劭注云漢武帝造明堂王莽修飾令大漢書武帝建元元年議立明堂遣使者安車蒲輪束帛加璧徴魯申公又郊祀志𥘉天子封泰山泰山東北阯古時有明堂處處險不敞上欲治明堂奉髙帝未曉其制度済南人公玉帶上黄帝時明堂圗明堂中有四殿四面無壁以茅蓋通水水圜宫垣爲複道上有楼從西南入名曰崑崙天子從之入以拜祀上帝焉於是上令奉髙作明堂汶上如帶圖及是嵗修封則祀太乙五帝於明堂上坐合髙皇帝祠坐對之祠后土於下房以二十大牢天子從崑崙道入始拜明堂如郊祀是嵗元封五年也本紀元封二年秋作明堂于泰山下五年春三月至泰山增封甲子祠髙祖于明堂以配上帝大𥘉元年冬十月行幸泰山十一月甲子朔旦冬至祀上帝于明堂圎丘漢圎丘在昆明故渠南有漢故圎丘今按髙二丈周回百二十歩大學漢太學在長安西北七里董仲舒䇿曰大學賢士之関教化之本原也王莽作宰衡時建弟子舎萬區起市郭上林苑中三輔舊事云漢大學中有市有獄宗廟宗尊也廟貌也所以髣髴先人尊貌也漢立四廟祖宗廟異處不序昭穆大上皇廟在長安西北長安故城中香室街南鴻翔府北関輔記曰在酒池北髙祖廟在長安西北故城中関輔記曰秦廟中鍾四枚皆在漢髙祖廟中三輔舊事云髙廟鍾重十二萬斤漢舊儀云髙祖廟鍾十枚各受十石撞之聲聞百里漢書文帝時盗取髙廟玉環故事又云光武至長安宫闕以以冠名武帝元光四年河决濮陽發卒十万救河决起龍渊之宫取此爲名武帝廟不言宫昭帝廟號徘徊宣帝廟號樂遊在杜陵西北神爵三年宣帝立廟於曲池之北号樂遊按其處則今呼樂遊園是也因樂遊苑得名元帝廟號長壽成帝廟號陽池太上皇髙祖父也有寢廟園原廟昭靈后髙祖母也武哀王高祖兄也昭哀后髙祖嫂也皆有園孝惠皇帝有寢廟園孝文大后孝昭大后皆有寢園衛思后戾太子母皇祖悼考皆有廟園宣帝父史皇孫廟曰奉明元成之丗祖宗廟在郡國者六十八合百六十七所京師自髙祖至宣帝與太上皇悼皇考各自居陵旁立廟并爲百七十六又園中各有寢便殿日祭於寢月祭於殿時祭於便殿寢日四上食朝歳二十五祠便殿四歳祠又月一遊衣冠四時祭宗廟用大牢列侯皆獻酎金以助祭諸侯王及列侯歳時詣京師待祠助祭漢儀諸侯王歳以户口酎黄金於漢廟皇帝臨受獻金金不如斤兩色惡王削縣侯免國注云因八月甞酎㑹諸侯廟中出金助祭謂之酎金酎正月旦作酒八月成三重醸醇酒也味厚故以薦宗廟金黄金也不如法者奪爵又冊封諸王必於祖廟冊命之示不敢專也武帝元狩六年夏四月乙巳立皇子閎爲齊王旦燕王胥廣陵王於廟中冊命漢制封皇子爲王者其實古諸侯也周末諸侯或稱王而漢天子自以皇帝爲稱故以王號加之揔名爲諸侯王新莽壞徹城西苑中建章承光包陽大臺儲元宫及平樂當路陽禄舘凡十餘所取其材瓦以起九廟莽曰予卜波水之北郎池之南惟玉食予又卜金水之南明堂之西亦惟玉食予將親築於是遂營長安城南提封百頃莽又親舉築三下九廟一黄帝二虞帝三陳胡王四齊敬王五濟北愍王六濟南悼王七元成孺王八陽平頃王九新都顯王殿皆重屋大𥘉祖廟東西南北各四十丈髙十七丈餘廟半之爲銅欂櫨飾以金銀琱文窮極百工之巧帶高増下功費數百鉅萬卒徒死者數萬南北郊天郊在長安城南地郊在長安城北所属掌治壇墠郊宫歳時供張以奉郊祀武帝定郊祀之事祠大一於甘泉圜丘取象天形就陽位也祀后土於汾隂澤中方丘取象地形就隂位也至成帝徙泰畤后土于京師始祀上帝于長安南郊祀后土于長安北郊社稷漢初除秦社稷立漢社稷其後又立官社配以夏禹而不立官稷至平帝元始三年始立官稷於官社之後後漢祭祀志云黄圖載元始儀甚悉今本無合入元始四年宰衡莽奏曰帝天之義莫大於承天承天之序莫重於郊祀祭天於南就陽位祠地於北就隂位圎丘象天方澤象地圎方因躰南北從位燔燎升氣瘞埋就類牲欲繭栗味尚清玄器成匏勺貴誠因質天地神所統故類乎上則禋于六宗望秩山川班於羣神皇天后土隨王所在而事佑焉丼泉大陽河東少陽咸失厥位不合礼制聖王之制必上當天心下合地意中攷人事故曰愷悌君子求福不回回而求福厥路不通正月泰卦乾坤合躰天地交通萬物聚出其律大簇天子親郊天地先祖配天先妣配地隂陽之别以日冬至祀天夏至祀后土君不省方而使有司六宗日月星山川海星則北辰川即河山岱宗三光衆明山阜百川衆流渟汙臯澤以類相屬各数秩望相序於是定郊祀祀長安南北郊罷甘泉河東祀觀漢傳士刘熹釋名曰觀觀也於上觀望也豫章觀武帝造在昆明池中亦曰昆明觀又一說曰上林苑中有昆明池觀蓋武帝所置桓譚新論云元帝𬒳疾逺求方士漢中送道士王仲都詔問所能對曰能忍寒乃以隆冬盛寒日令袒載駟馬於上林昆明池上環以氷而御駟者厚衣狐裘寒戰而仲都無變色卧於池上曛然自若即此也飛廉觀在上林武帝元封二年作飛廉神禽能致風氣者身似鹿頭如雀有角而虵尾文如豹武帝命以銅鑄置觀上因以爲名班固漢武故事曰公孫卿言神人見於東萊山欲見天子上於是幸緱氏登東萊留數日無所見惟見大人跡上怒公孫卿之無應卿懼誅乃因衛青白上云仙人可見而上往遽以故不相值今陛下可爲觀於緱氏則神人可致且仙人好樓居不極髙顯神終不降也於是上於長安作飛廉觀髙四十丈於甘泉作延夀觀亦如之後漢明帝永平五年至長安悉取飛廉并銅馬置之西門外爲平樂觀董卓悉銷以爲錢屬玉觀在扶風屬玉水鳥似鵁鶄以名觀也又曰屬玉似鴨而大長頸赤目紫紺色宣帝甘露二年十二月行幸萯陽宫屬玉觀青梧觀在五柞宫之西觀亦有三梧桐樹下有石麒麟二枚刋其脇文字是秦始皇驪山墓上物也頭髙一丈三尺東邊者前左脚折處有赤如血父老謂其有神皆含血屬筋焉射熊觀在長楊宫武帝好自擊熊司馬相如從至上林作賦諌楊雄亦作長楊賦石闕觀封巒觀雲陽宫記云宫東北有石門山岡巒糾紛干霄秀出有右巖容數百人上起甘泉觀甘泉賦云封巒石闕弭迤乎延屬白楊觀在昆明池東長平觀在池陽宫臨涇水龍臺觀在豐水西北近渭涿木觀在上林苑細柳觀在長安西北三輔舊事曰漢文帝大將軍周亞夫軍於細柳今呼古徼是也成山觀成王在東萊不夜縣於其上築宫闕以爲觀成山觀不在三輔例見宫室門仙人觀霸昌觀蘭池觀安䑓觀淪沮觀在城外又有禁觀董賢觀蒼龍觀當市觀旗亭樓馬伯騫樓在城内麒麟朱鳥龍興含章皆舘名三輔黄圖卷之五
