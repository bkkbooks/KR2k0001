front:
  text: 三輔黃圖卷之二
  hash: sha256:89276cbbb234f64125c45ae00a458c0a8101aa40e56a48a999f9f5275a164272
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0001_SBCK_002-1a}
body:
  text: 長安九市廟記云長安市有九各方二百六十六步六市在道西三市在道東凡四里為一市致九州之人在突門夾橫橋大道市樓皆重屋又曰旗亭樓在杜門大道南又有當市樓有令署以察商賈貨財買賣貿昜之事三輔都尉掌之直市在富平津西南二十五里即秦文公造物無二價故以直市為名張衡西京賦云郭開九市通闤帶闠旗亭重立俯察百隧是也又案郡國志長安大俠黃子夏居柳市司馬季主卜於東市朝錯朝服斬於東市西市在醴泉坊長安八街九陌有香室街夕隂街尚冠前街三輔舊事云長安城中八街九陌漢書劉屈氂妻梟首華陽街京兆尹張敞走馬章臺街陳湯斬郅支王首縣藁街張衡西京賦云參塗夷庭街街相經㕓里端直甍宇齊平是也長安城中閭里長安閭里一百六十室居櫛比門巷修直有宣明建陽昌隂尚冠修城黃棘北煥南平等里漢書万石君奮徙家長安戚里宣帝在民間時常在尚冠里劉向列女傳節女長安大昌里人也宫長樂宫本秦之興樂宫也髙皇帝始居擽陽七年長樂宫成徙居長安城三輔舊事宫殿疏皆曰興樂宫秦始皇造漢修飾之周回二十里前殿東西四十九丈七尺兩杼中三十五丈深十二丈長樂宫有鴻臺有臨華殿有溫室殿有信宫長秋永夀永寧四殿髙帝居此宫後大后常居之孝惠至平帝皆居未央宫漢書宣帝元康四年神爵五采以萬數集長樂宫五鳯三年鸞鳯集長樂宫東闕中樹上王莽改長樂宫為常樂室在長安中近東直杜門未央宫漢書曰髙祖七年蕭何造未央宫立東闕北闕闕門觀也劉熙釋名曰闕在門兩旁中央闕然為道也門闕天子號令賞罰所由出也未央宫殿雖南向而上書奏事謁見之徒皆在北闕焉是則以北闕為正門而又有東闕東門至於西南兩靣無門闕矣蓋䔥何立未央宫以厭勝之術理然乎前殿武庫藏兵器之處也太倉廪粟所在一百三十楹在長安城外東南上見其壯麗太甚怒曰天下胸胸勞苦數嵗成敗未可知是何治宫室過度也何對曰以天下未定故可因以就宫室且天子以四海為家非令牡麗無以重威無令後丗有以加也上悅自櫟陽徙居焉未央宮周回二十八里前殿東西五十丈深十五丈髙三十五丈前殿曰路寢見諸侯羣臣處也營未央宫因龍首山以制前殿山長六十里頭入渭水尾逹樊川秦時有黑龍從南山出飲渭水其行道因成土山疏山為臺殿不假板築髙出長安城西京賦所謂疏龍首以抗前殿此也至孝武以木蘭為棼橑木蘭香木棼橑棟椽文杏為梁柱杏木之有文者金鋪玉户金鋪扉上有金華中作獸及龍蛇鋪首以銜環也玉户以玉飾户也華榱璧璫雕楹玉磶楹柱也磶柱下石也重軒鏤檻青瑣丹墀青瑣窗也墀殿階也左墄右平右乘車上故使之平左以人上故為之階級墄階級也黃金為璧帶間以和氏珍玉風至其聲玲瓏然也未央宫有宣室麒麟金華承明武臺鈎弋等殿又有殿閣三十有二有壽成萬歲廣明椒房清凉水延玉堂夀安平就宣德東明飛雨鳯凰通光曲臺白虎等殿廟記云未央宫有增成昭陽殿漢宫殿疏曰未央宫有麒麟閣天祿閣有金馬門青鎖門玄武蒼龍二闕朱鳥堂畫堂甲觀非常室又有鈎盾署弄田三輔決録曰未央宫有延年殿合歡殿四車殿又漢宫閣記云未央宫有宣明長年溫室昆德四殿又有玉堂增盤閣宣室閣三輔舊事云武帝於未央宫起髙門武臺殿漢武故事云神明殿在未央宫王莽改未央宫曰壽成室前殿曰玉路堂如路寢也按舊圖漸臺織室凌室皆在未央宫建章宫武帝太𥘉元年柏梁殿災粵巫勇之曰粵俗有火災即復起大屋以厭勝之帝於是作建章宫度為千門萬户宫在未央宫西長安城外帝於未央宫營造日廣以城中為小乃於宫西跨城池作飛閣通建章宫構輦道以上下輦道為閣道可以乘輦而行宫之正門曰閶闔閶闔天門也宮門名閶闔者以象天門也髙二十五丈亦曰璧門左鳯闕闕上有金鳯髙丈餘漢書集注曰今長安故城西俗呼貞女樓即建章闕也髙二十五丈右神明臺言臺髙神明可居其上門內北起別風闕在閶闔門內以其出宫垣識風從何處來以為闕名也髙五十丈對峙井幹樓髙五十丈輦道相屬焉連閣皆有罘罳連閣曲閣也以覆重刻垣墉翳之處畫以雲氣鳥獸其形罘罳然前殿下視朱央其西則廣中殿受萬人三輔舊事云建章周回三十里東起別風闕髙二十五丈乘髙以望逺又於宫門北起圎闕髙二十五丈上有銅鳯凰赤眉賊壞之西京賦云圎闕聳以造天若雙碣之相望是也廟記云建章宫北門髙二十五丈建章北闕門也又有鳯凰闕漢武帝造髙七十丈五尺鳯凰闕一名別風闕又云嶕嶢闕在圎闕門內二百步繁欽建章序云秦漢規模廓然泯毀惟建章鳯闕聳然獨存雖非象魏之制亦一代之巨觀古歌云長安城西有雙闕上有雙銅雀一鳴五榖熟再鳴五穀熟按銅雀即銅鳯凰也楊震關輔古語云長安民俗謂鳯凰闕為貞女樓司馬相如賦云豫章貞女樹長千仞大連抱冬夏常青未嘗凋落若有貞節故以為名漢書曰建章宫南有玉堂璧門三層臺髙三十丈玉堂內殿十二門階陛皆玉為之鑄銅鳯髙五尺飾黃金棲屋上下有轉樞向風若翔椽首薄以璧玉因曰璧門建章有駘蕩馺娑枍詣天梁竒寶鼓簧等宫又有玉堂神明堂疏圃鳴鑾竒華銅柱函德二十六殿太液池唐中池桂宫漢武帝造周回十餘里漢書曰桂宫有紫房復道通未央宫關輔記云桂宫在未央北中有明光殿土山復道從宫中西上城至建章神明臺蓬萊山三秦記未央宫漸臺西有桂宫中有明光殿皆金玉珠璣為簾箔處處明月珠金戺玉階晝夜光明又西京雜記云武帝為七寶牀雜寶按厠寶屏風列寶帳設於桂宫時人謂為四寶宫長安記曰桂宫在未央宫北亦曰北宫北宫在長安城中近桂宫俱在未央宫北周回十里高帝時制度草創孝武增修之中有前殿廣五十步珠簾玉户如桂宫漢書曰吕太后崩孝惠皇后廢處北宫又曰哀帝崩貶皇太后趙氏為孝成皇后退居北宫皇后薄氏退居桂宫甘泉宫一曰雲陽宫史記秦始皇二十七年作甘泉宫及前殿築甬道築垣墻如街巷自咸陽屬之關輔記曰林光宫一曰甘泉宫秦所造在今池陽縣西故甘泉山宫以山為名或曰髙泉山蓋習俗語訛尓宫周匝十餘里漢武帝建元中增廣之周十九里去長安三百里望見長安城黃帝以來圎丘祭天處漢志雲陽縣有休屠金人徑路神祠三所音義云胸奴祭天處本雲陽甘泉山下秦奪其地徙休屠右地郊祀志云徑路神祠祭休屠王處遁甲開山圗云雲陽先生之墟也武帝造闕於南以象方色於甘泉宫更置前殿始造宫室有芝生甘泉殿邊房中房中樂有芝草之歌漢舊儀云芝有九莖芝草歌曰九莖連葉芝金色緑葉朱實夜有光乃作芝房之歌帝又起紫殿雕文刻鏤黼黻以玉飾之成帝永始四年行幸甘泉郊泰畤神光降於紫殿今按甘泉谷北岸有槐樹今謂玉樹根幹盤峙三二百年木也楊震關輔古語云耆老相傳咸以謂此樹即楊雄甘泉賦所謂玉樹青葱也甘泉有髙光宫又有林光宫有長定宫竹宫通天臺通靈臺武帝作迎風館於甘泉山後加露寒儲胥二館皆在雲陽甘泉中西廂起倣徨觀築甘泉苑建元中作石闕封巒鳷鵲觀於苑垣內宫南有昆明池苑南有棠梨宫漢未央長樂甘泉宫四面皆有公車公車主受章疏之處司馬門凡言司馬者宫垣之內兵衛所在司馬主武事故謂宫之外門為司馬門按漢宫衛令諸出入殿門公車司馬門者皆下不如令罰金四兩王莽改公車司馬門曰王路四門分命諫大夫四人受章疏以通下情百官表衛尉屬官有公車司馬令丞漢官儀云公車司馬掌殿司馬門夜僥宫中天下上事及闕下凡所徴召皆總領之令秩六百石三輔黃圖卷之二
