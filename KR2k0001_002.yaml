front:
  text: 三輔黄圖卷之二
  hash: sha256:1eb3b323a1eef5d81d00ef468f2ec9bc2e432b41e7cd791fc3469f9997fb0892
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0001_SBCK_002-1a}
body:
  text: 長安九市廟記云長安市有九各方二百六十六歩六市在道西三市在道東凡四里爲一市致九州之人在突門夾横橋大道市楼皆重屋又曰旗亭楼在杜門大道南又有當市樓有令署以察商賈貨財買賣貿昜之事三輔都尉掌之直市在富平津西南二十五里即秦文公造物無二價故以直市爲名張衡西京賦云郭開九市通闤帶闠旗亭重立俯察百隧是也又案郡國志長安大俠黄子夏居柳市司馬季主卜於東市晁錯朝服斬於東市西市在醴泉坊長安八街九陌有香室街夕隂街尚冠前街三輔舊事云長安城中八街九陌漢書劉屈氂妻梟首華陽街京兆尹張敞走馬章臺街陳湯斬郅支王首縣藁街張衡西京賦云參塗夷庭街街相經㕓里端直甍宇齊平是也長安城中閭里長安閭里一百六十室居櫛比門巷脩直有宣明建陽昌隂尚冠修城黄棘北煥南平等里漢書万石君奮徙家長安戚里宣帝在民間時常在尚冠里劉向列女傳節女長安大昌里人也宫長樂宫本秦之興樂宫也髙皇帝始居擽陽七年長樂宫成徙居長安城三輔舊事宫殿䟽皆曰興樂宫秦始皇造漢修飾之周回二十里前殿東西四十九丈七尺兩杼中三十五丈深十二丈長樂宫有鴻臺有臨華殿有温室殿有信宫長秋永夀永寧四殿髙帝居此宫後大后常居之孝惠至平帝皆居未央宫漢書宣帝元康四年神爵五采以萬數集長樂宫五鳯三年鸞鳯集長樂宫東闕中樹上王莽改長樂宫爲常樂室在長安中近東直杜門未央宫漢書曰髙祖七年蕭何造未央宫立東闕北闕闕門觀也劉熈釋名曰闕在門兩旁中央闕然爲道也門闕天子号令賞罰所由出也未央宫殿虽南向而上書奏事謁見之徒皆在北闕焉是則以北闕爲正門而又有東闕東門至於西南兩靣無門闕矣盖䔥何立未央宫以厭勝之術理然乎前殿武庫藏兵器之處也太倉廪粟所在一百三十楹在長安城外東南上見其壯麗太甚怒曰天下匈匈勞苦數嵗成敗未可知是何治宫室過度也何對曰以天下未定故可因以就宫室且天子以四海爲家非令牡麗無以重威無令後丗有以加也上悅自櫟陽徙居焉未央宮周回二十八里前殿東西五十丈深十五丈髙三十五丈前殿曰路寢見諸侯羣臣處也營未央宫因龍首山以制前殿山長六十里頭入渭水尾逹樊川秦時有黒龍從南山出飲渭水其行道因成土山䟽山爲臺殿不假板築髙出長安城西京賦所謂䟽龍首以抗前殿此也至孝武以木蘭爲棼橑木蘭香木棼橑棟椽文杏爲梁柱杏木之有文者金鋪玉户金鋪扉上有金華中作獸及龍蛇鋪首以衘環也玉户以玉飾户也華榱璧璫雕楹玉磶楹柱也磶柱下石也重軒鏤檻青瑣丹墀青瑣䆫也墀殿堦也左墄右平右乗車上故使之平左以人上故爲之階級墄階級也黃金爲璧帶間以和氏珍玉風至其聲玲瓏然也未央宫有宣室麒麟金華承明武臺鈎弋等殿又有殿閣三十有二有壽成萬歲廣明椒房清凉水延玉堂夀安平就宣德東明飛雨鳯凰通光曲臺白虎等殿廟記云未央宫有増成昭陽殿漢宫殿䟽曰未央宫有麒麟閣天禄閣有金馬門青鎻門玄武蒼龍二闕朱鳥堂畫堂甲觀非常室又有鈎盾署弄田三輔決録曰未央宫有延年殿合歡殿四車殿又漢宫閣記云未央宫有宣明長年温室昆德四殿又有玉堂増盤閣宣室閣三輔舊事云武帝於未央宫起髙門武臺殿漢武故事云神明殿在未央宫王莽改未央宫曰壽成室前殿曰玉路堂如路寢也按舊圖漸臺織室凌室皆在未央宫建章宫武帝太𥘉元年栢梁殿災粤巫勇之曰粤俗有火災即復起大屋以厭勝之帝於是作建章宫度爲千門萬户宫在未央宫西長安城外帝於未央宫營造日廣以城中爲小乃於宫西跨城池作飛閣通建章宫構輦道以上下輦道爲閣道可以乗輦而行宫之正門曰閶闔閶闔天門也宮門名閶闔者以象天門也髙二十五丈亦曰璧門左鳯闕闕上有金鳯髙丈餘漢書集注曰今長安故城西俗呼貞女楼即建章闕也髙二十五丈右神明臺言䑓髙神明可居其上門内北起別風闕在閶闔門内以其出宫垣識風從何處來以爲闕名也髙五十丈對峙井幹樓髙五十丈輦道相属焉連閣皆有罘罳連閣曲閣也以覆重刻垣墉翳之處畫以雲氣鳥獸其形罘罳然前殿下視朱央其西則廣中殿受萬人三輔舊事云建章周回三十里東起別風闕髙二十五丈乗髙以望逺又於宫門北起圎闕髙二十五丈上有銅鳯凰赤眉賊壞之西京賦云圎闕聳以造天若雙碣之相望是也廟記云建章宫北門髙二十五丈建章北闕門也又有鳯凰闕漢武帝造髙七十丈五尺鳯凰闕一名別風闕又云嶕嶢闕在圎闕門内二百歩繁欽建章序云秦漢規模廓然泯毀惟建章鳯闕聳然獨存雖非象魏之制亦一代之巨觀古歌云長安城西有雙闕上有雙銅雀一鳴五榖熟再鳴五穀熟按銅雀即銅鳯凰也楊震關輔古語云長安民俗謂鳯凰闕爲貞女樓司馬相如賦云豫章貞女樹長千仞大連抱冬夏常青未甞凋落若有貞節故以爲名漢書曰建章宫南有玉堂璧門三層䑓髙三十丈玉堂内殿十二門階陛皆玉爲之鑄銅鳯髙五尺飾黄金棲屋上下有轉樞向風若翔椽首薄以璧玉因曰璧門建章有駘蕩馺娑枍詣天梁竒寳鼓簧等宫又有玉堂神明堂䟽圃鳴鑾竒華銅柱凾德二十六殿太液池唐中池桂宫漢武帝造周回十餘里漢書曰桂宫有紫房複道通未央宫關輔記云桂宫在未央北中有明光殿土山複道從宫中西上城至建章神明臺蓬萊山三秦記未央宫漸臺西有桂宫中有明光殿皆金玉珠璣爲簾箔處處明月珠金戺玉堦晝夜光明又西京雜記云武帝爲七寳牀雜寳按厠寳屏風列寳帳設於桂宫時人謂爲四寳宫長安記曰桂宫在未央宫北亦曰北宫北宫在長安城中近桂宫俱在未央宫北周回十里高帝時制度草創孝武増修之中有前殿廣五十歩珠簾玉户如桂宫漢書曰吕太后崩孝惠皇后廢處北宫又曰哀帝崩貶皇太后趙氏爲孝成皇后退居北宫皇后薄氏退居桂宫甘泉宫一曰雲陽宫史記秦始皇二十七年作甘泉宫及前殿築甬道築垣墻如街巷自咸陽屬之關輔記曰林光宫一曰甘泉宫秦所造在今池陽縣西故甘泉山宫以山爲名或曰髙泉山盖習俗語訛尓宫周匝十餘里漢武帝建元中増廣之周十九里去長安三百里望見長安城黄帝以來圎丘祭天處漢志雲陽縣有休屠金人徑路神祠三所音義云匈奴祭天處本雲陽甘泉山下秦奪其地徙休屠右地郊祀志云徑路神祠祭休屠王處遁甲開山圗云雲陽先生之墟也武帝造闕於南以象方色於甘泉宫更置前殿始造宫室有芝生甘泉殿邊房中房中樂有芝草之歌漢舊儀云芝有九莖芝草歌曰九莖連葉芝金色緑葉朱實夜有光乃作芝房之歌帝又起紫殿雕文刻鏤黼黻以玉飾之成帝永始四年行幸甘泉郊㤗畤神光降於紫殿今按甘泉谷北岸有槐樹今謂玉樹根幹盤峙三二百年木也楊震關輔古語云耆老相傳咸以謂此樹即楊雄甘泉賦所謂玉樹青葱也甘泉有髙光宫又有林光宫有長定宫竹宫通天臺通靈䑓武帝作迎風舘於甘泉山後加露寒儲胥二舘皆在雲陽甘泉中西廂起彷徨觀築甘泉苑建元中作石闕封巒鳷鵲觀於苑垣内宫南有昆明池苑南有棠梨宫漢未央長樂甘泉宫四面皆有公車公車主受章䟽之處司馬門凢言司馬者宫垣之内兵衛所在司馬主武事故謂宫之外門爲司馬門按漢宫衛令諸出入殿門公車司馬門者皆下不如令罰金四兩王莽改公車司馬門曰王路四門分命諫大夫四人受章䟽以通下情百官表衛尉屬官有公車司馬令丞漢官儀云公車司馬掌殿司馬門夜儌宫中天下上事及闕下凢所徴召皆緫領之令秩六百石三輔黄圖卷之二
