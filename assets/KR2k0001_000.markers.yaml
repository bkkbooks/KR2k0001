  - {type: variant, offset: 4, length: 0, content: '', WYG: 地理𩔖一宮殿簿之屬提要臣等謹案三輔黄圖六卷不著撰人名氏晁公武讀書志據所引劉昭續漢志注定為梁陳間人作程大昌雍録則謂晉灼所引黄圖多不見於今本而今本漸臺滄池髙廟元始祭社稷儀皆明引舊圖知非晉灼之所見又據改槐里為興平事在至徳二載知為唐肅宗以後人作其説較公武為有據此本惟髙廟一條不引舊圖氷池一條引舊圖而大昌未及其餘三條並同葢即大昌所見之本偶誤氷池為髙廟也其書皆記長安古迹間及周代靈臺靈囿諸事然以漢為主亦間及河間日華宫梁曜華宫諸事而以京師為主故稱三輔黄圖三輔者顔師古謂長安以東為京兆長陵以北為左馮翊渭城以西為右扶風也所紀宫殿苑囿之制條分縷析至為詳備考古者恒所取資惟兼采西京雜記漢武故事諸偽書洞冥記拾遺記諸雜説愛博嗜奇轉失精核不免為白璧㣲瑕耳乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀三輔黄圖原}
