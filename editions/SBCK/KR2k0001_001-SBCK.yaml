front:
  text: 三輔黄圗卷之一
  hash: sha256:4f12fd22e0c66411f04cfbfef5547208dcdefe71bc2a292c1ad34c240f114fe8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0001_SBCK_001-1a}
body:
  text: 三輔㳂革禹貢九州舜置十二牧雍其一也古豐鎬之地平王東遷以岐豐之地賜秦襄公至孝公始都咸陽秦孝公十二年於渭北作咸陽徙都之咸陽在九􅉄山渭水北山水俱在南故名咸陽秦并天下置内史以領關中項籍㓕秦分其地爲三以章邯爲雍王都廢丘今興平縣地司馬忻爲塞王都櫟陽董翳爲翟王都髙奴今延州金明縣謂之三秦漢髙祖入􅀜定三秦元年更爲渭南郡九年罷郡復爲内史五年髙帝在洛陽婁敬􅀃曰夫秦地􅀍山帶河四塞以爲固卒然有急百萬衆可立具因秦之故資甚美膏􅃾之地此所謂天府陛下入􅀜而都之山東雖亂秦故地可全而有也又田肯賀髙帝曰陛下治秦中秦形􅀔之國帶河阻山持㦸百萬秦得百二焉地􅀔便利其以下兵於諸侯猶居髙屋之上建瓴水也自是漢始都之景帝分置左右内史此爲右内史武帝太初元年改内史爲京兆尹與左馮翊右扶風謂之三輔其理俱在長安古城中三輔治所京兆在故城南尚冠里京大也天子曰兆民公羊曰京大也師衆也天子所居馮翊在故城内太上皇廟西南馮慿也翊輔也翊輔京師也其地今同州扶風在夕隂街北扶持也助也言助風化今岐州三輔者謂主爵中尉及左右内史漢武帝改曰京兆尹左馮翊右扶風共治長安城中是爲三輔三輔郡皆有都尉如諸郡京輔都尉治華隂左輔都尉治髙陵右輔都尉治郿王莽分長安城旁六郷置帥各一人分三輔爲六都尉渭城安陵以西北至栒邑義渠十縣屬京尉大夫府居故長安寺髙陵以北十縣属師尉大夫府居故廷尉府新豐以東至湖十縣属翊尉大夫府居城東霸陵杜陵以東至藍田西至武功郁夷十縣属光禄大夫府居城西茂陵槐里以西至汧十縣属扶尉大夫府居城西長陵池陽以北祋祤十縣属列尉大夫府居後漢光武之後扶風出治槐里馮翊出治髙陵案百官表顔師古注引黄圖云京兆在尚冠前街東入故中尉府馮翊在太上皇廟西入右扶風在夕隂街北入故主爵府長安以東爲京兆長陵以北爲左馮翊渭北以西爲右扶風咸陽故城在今咸陽東二十里自秦孝公至始皇帝胡亥竝都此城案孝公十二年作咸陽築兾闕徙都之始皇二十六年徙天下髙貲富豪於咸陽十二萬户諸廟及䑓􅁐皆在渭南秦毎破諸侯徹其宫室作之咸陽北坂上南臨渭自雍門以東至涇渭殿屋􅃨道周閣相屬所得諸侯美人鍾鼓以充之二十七年作信宫渭南巳而更命信宫爲極廟象天極自極廟道通驪山作甘泉前殿築甬道自咸陽屬之始皇窮極奢侈築咸陽宫因北陵營殿端門四逹以制紫宫象帝居引渭水灌都以象天漢橫橋南渡以法牽牛橋廣六丈南北二百八十歩六十八間八百五十柱二百一十二梁橋之南北隄繳立石柱咸陽北至九􅉄甘泉南至鄠杜東至河西至汧渭之交東西八百里南北四百里離宫别舘相望聮屬木衣綈綉土􅀍朱紫宫人不移樂不改懸窮年忘歸猶不能徧宫馳道閣萯陽宫秦文王所起在今鄠縣西南二十三里棫楊宫秦昭王所作在今岐州扶風縣東北西垂宫文公元年居西垂宫平陽封宫武公元年伐彭戯氏至于華山下居於平陽封宫橐泉宫皇覧曰秦穆公冡在橐泉宫祈年觀下歩髙宫在新豐縣亦名市丘城歩夀宫在新豐縣歩髙宫西虢宫秦宣大后起在今岐州虢縣界長楊宫在今盩厔縣東南三十里本秦舊宫至漢修飾之以備行幸宫中有垂楊數畒因爲宫名門曰射熊觀秦漢游獵之所蘄年宫穆公所造廟記曰蘄年宫在城外秦始皇夲紀蘄年宫在雍梁山宫始皇幸梁山在好畤信宫亦曰咸陽宫解在前興樂宫秦始皇造漢修飾之周回二十餘里漢太后常居之朝宫始皇三十五年以咸陽人多先王之宫庭小曰吾聞周文王都豐武王都鎬豐鎬之間帝王之都也乃營朝宫於渭南上林苑庭中可受十萬人車行酒􅀐行灸千人唱萬人和收天下兵古以銅爲兵聚之咸陽銷以爲鍾鐻髙三丈鍾小者皆千石也銷鋒鏑以爲金人十二以弱天下之人立於宫門三輔􅃇事云鑄金狄人立阿房殿前坐髙三丈銘其後曰皇帝二十六年􅀄兼天下改諸侯爲郡縣一法律同度量大人來見臨洮其大五丈足跡六尺銘李斯􅂐蒙恬書董卓悉椎破銅人銅䑓以爲小錢英雄記曰昔大人見臨洮而銅人鑄臨洮生卓而銅人毀天下大亂卓身㓕抑有以也餘二人魏明帝欲徙詣洛陽清明門裏載至霸城重不可致便留之阿房宫亦曰阿城惠文王造宫未成而亡始皇廣其宫規恢三百餘里離宫別舘彌山跨谷輦道相屬閣道通驪山八十餘里表南山之顛以爲闕絡樊川以爲池作阿房前殿東西五十歩南北五十丈上可坐萬人下建五丈旗以木蘭爲梁以磁石爲門磁石門乃阿房北闕門也門在阿房前悉以磁石爲之故專其目令四夷朝者有􅀮甲懷刃入門而脅止以示神亦曰􅁍胡門周馳爲􅃨道度渭屬之咸陽以􅁚太極閣道抵營室也阿房宫未成欲更擇令名名之作宫阿基旁故天下謂之阿房宫隱宫徒刑者七十餘萬人乃分作阿房宫或作驪山蘭池宫始皇三十一年爲微行咸陽與武士四人俱夜出逢盗蘭池注渭城縣有蘭池宫鍾宫在鄠縣東北二十五里始皇收天下兵銷爲鍾鐻此或其處也馳道案秦夲紀始皇二十七年治馳道注曰馳道天子道也蔡邕曰馳道天子所行道也今之中道然漢書賈山傳曰秦爲馳道於天下東窮燕齊南極呉楚江湖之上濱海之􅀚畢至道廣五十歩三丈而樹厚築其外隱以金椎樹以青松漢令諸侯有制得行馳道中者行旁道無得行中央三丈也不如令没入其車馬雲閣二丗所造起雲閣欲與南山齊望夷宫在涇陽縣界長平觀道東北臨涇水以望北夷以爲宫名林光宫胡亥所造從廣各五里在雲陽縣界漢長安故城漢之故都髙祖七年方修長安宫城自櫟陽徙居此城本秦離宫也初置長安城本狹小至惠帝更築之按惠帝元年正月初城長安城三年春發長安六百里内男女十四萬六千人三十日罷城髙三丈五尺下闊一丈五尺六月發徒􅀠二萬人常役至五年􅃨發十四萬五千人三十日乃罷九月城成髙三丈五尺下闊一丈五尺上闊九尺雉髙三坂周回六十五里城南爲南斗形北爲北斗形至今人呼漢京城爲斗城是也漢舊儀曰長安城中經緯各長三十二里十八歩地九百七十三頃八街九陌三宫九府三廟十二門九市十六橋地皆黒壤今赤如火堅如石父老傳云盡鑿龍首山土爲城水泉深二十餘丈樹宜槐與榆松栢茂盛焉城下有池周繞廣三丈深二丈石橋各六丈與街相直秦漢風俗漢志曰秦有四塞之固昔后稷封􅘭公劉處􅃎大王徙岐文王作豐武王治鎬其民有先王遺風好稼穡本業故􅃎詩言農桑衣食之業甚備秦都咸陽徙天下豪富十二萬户漢髙帝都長安徙諸齊田楚屈昭景及諸功臣於長陵後丗丗徙吏二千石髙貲冨人及豪傑兼并之家於諸陵強本弱末以制天下是故五方錯雜風俗不一貴者崇侈靡賤者薄仁義富強則啇賈爲利貧窶則盗賊不禁閭里嫁娶􅀹尚財貨送死過度故漢之京輔號爲難理古今之所同也都城十二門長安城東出南頭第一門霸城門民見門色青名曰青城門或曰青門門外舊出佳􅀲廣陵人邵平爲秦東陵侯秦破爲布衣種􅀲青門外􅀲美故時人謂之東陵􅀲廟記曰霸城門亦曰青綺門漢書王莽天鳯三年霸城門災莽更霸城門曰仁壽門無􅆠亭長安城東出第二門曰清明門一曰籍田門以門内有籍田倉一曰凱門漢書平帝元始四年東風吹屋瓦且盡即此門也漢宫殿䟽曰第二門名城東門莽更名曰宣德門布恩亭長安城東出北頭第一門曰宣平門民間所謂東都門漢書曰成帝建始元年有白蛾群飛蔽日從東都門至枳道又䟽廣太傅受少傅上䟽乞骸骨歸公卿大夫爲設祖道供張東都門外即此門也其郭門亦曰東都即逢萌掛冠處也王莽更名春王門正月亭東都門至外郭亭十三里長安城南出東頭第一門曰覆盎門一號杜門廟記曰覆盎門與洛門相去十三里二百一十歩門外有魯班輸所造橋工巧絶丗長樂宫在城中近東直杜門其南有下杜城漢書集註云故杜陵之下聚落也故曰下門又曰端門北對長樂宫漢書曰戾太子所斫覆盎門出奔湖王莽更名曰永清門長茂亭長安城南出第二門曰安門亦曰鼎路門北對武庫王莽更名曰光禮門顯樂亭長安城南出第三門曰西安門北對未央宫一曰便門即平門也古者平便皆同字武帝建元二年初作便門橋跨渡渭水上以趍陵其道易直三輔決録曰長安城西門曰便橋橋北與門對因號便橋王莽更名曰信平門誠正亭長安城西出南頭第一門曰章城門漢宫殿䟽曰章城門漢城西面南頭第一門三輔舊事曰章門亦曰光畢門又曰便門漢書成帝元延元年章城門牡自亡顔師古注云牡所以下閉者也亦以鉄爲之王莽改曰萬秋門億年亭長安城西出第二門曰直城門漢宫殿䟽曰西出南頭第二門也亦曰故龍樓門門上有銅龍本名直門王莽更曰直道門端路亭長安城西出北頭第一門曰雍門本名西城門王莽改曰章義門著義亭其水北入有亟里民呼曰亟里門長安城北出東頭第一門曰洛城門又曰髙門漢宫殿䟽曰髙門長安北門也又名􅔏雀䑓門外有漢武承露盤在䑓上長安城北第二門曰厨城門長安厨在門内因爲門名王莽更名建子門廣丗亭長安城北出西頭第一門曰横門漢書虒上小女陳持弓走入光門即此門也門外有橋曰横橋漢書作走入横城門如淳曰横音光漢城門皆有候門􅀱主􅀱時謹啓閉也三輔决録曰長安城靣三門四靣十二門皆通逹九逵以相經緯衢路平正可竝列車􅁤十二門三塗洞闢隱以金椎周以林木左右出入爲徃來之徑行者升降有上下之別班固西都賦云披三條之廣路立十二之通門又張衡西京賦云城郭之制則旁開三門參􅂗夷庭方􅁤十二街衢相經是也三輔黄圖卷之一
