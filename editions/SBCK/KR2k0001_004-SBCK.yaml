front:
  text: 三輔黃圗卷之四
  hash: sha256:e137a9de7a60f5c5866dcce7b57adbfe7c012f98394294e5b3b4b64728c45dbb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0001_SBCK_004-1a}
body:
  text: 􅁐囿周靈囿文王囿也詩曰王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯毛萇注云囿所以域養禽獸也天子百里諸侯四十里靈者言文王之有靈德也靈囿言道行於􅁐囿也孟子曰文王之囿方七十里芻蕘者往焉雉兎者往焉與民同其利也文王靈囿在長安縣西四十二里漢上林􅁐即秦之舊苑也漢書云武帝建元三年開上林􅁐東南至藍田冝春鼎湖御􅀫昆吾旁南山而西至長楊五柞北繞黃山瀕渭水而東周袤三百里離宫七十所皆容千乗萬􅀐漢宫殿䟽云方三百四十里漢舊儀云上林苑方三百里苑中養百獸天子秋冬射獵取之帝初修上林􅁐群臣逺方各獻名果異卉三千餘種植其中亦有製爲美名以標竒異茂陵富民􅀽廣漢藏鏹鉅萬家僮八九百人於北山下築園東西四里南北五里激流水注其中構石爲山髙十餘丈連延數里養白鸚鵡紫鴛鴦􅏚牛青兕竒獸珍禽委積其間積沙爲洲嶼激水爲波濤致江鷗海鶴孕雛産鷇延漫林池竒樹異草靡不培植屋皆徘徊連屬重閣脩廊行之移晷不能徧也廣漢後有罪誅没入爲官園鳥獸草木皆移入上林􅁐中上林苑有昆明觀武帝置又有繭觀平樂觀逺望觀燕昇觀觀􅁚觀便門觀白鹿觀三爵觀陽禄觀隂德觀鼎郊觀樛木觀椒唐觀魚烏觀元華觀走馬觀柘觀上蘭觀郎池觀當路觀皆在上林苑又舊儀曰上林有令有尉禽獸簿記其名數又有上林詔獄主治苑中禽獸官舘之事属水衡又上林苑中有六池市郭宫殿魚臺犬䑓獸圈甘泉苑武帝置縁山谷行至雲陽三百八十一里西入扶風凢周囬五百四十里􅁐中起宫殿䑓閣百餘所有仙人觀石闕觀封巒觀鳷鵲觀御􅀫苑在長安城南御􅀫川中漢武帝爲離宫別舘禁禦人不得入往來遊觀止􅀫其中故曰御􅀫三秦記云御􅀫園出栗十五枚一勝大棃如五勝落地則破其取棃先以布囊承之號曰含消此園棃也思賢苑孝文帝爲太子立思賢􅁐以招賔客苑中有堂室六所客舘皆廣廡髙軒屏風幃褥甚麗廣陵王胥有勇力常於別囿學格熊後遂能空手搏之莫不絶脰後爲獸所傷䧟腦而死􅀶望苑武帝立子據爲太子爲太子開􅀶望苑以通賔客漢書曰武帝年二十九乃得太子甚喜太子冠爲立􅀶望􅁐使之通賔客從其所好又云􅀶望苑在長安城南杜門外五里有遺址西郊苑漢西郊有苑囿林麓藪澤連亘繚以周垣四百餘里離宫別舘三百餘所三十六苑漢儀注大僕牧師諸苑三十六所分布北邊西邊以郎爲􅁐􅁥宦官奴婢三萬人養馬三十萬疋養鳥獸者通名爲􅁐故謂之牧馬處爲􅁐樂遊苑在杜陵西北宣帝神爵三年春起宜春下􅁐在京城東南隅元帝紀注東南隅曲池是梨園雲陽宫記曰雲陽車箱坂下有梨園一頃梨數百株青翠繁宻望之如車蓋池沼周文王靈沼在長安西三十里詩曰王在靈沼於牣魚躍漢昆明池武帝元狩四年穿在長安西南周回四里西南夷傳曰天子遣使求身毒國市竹身毒國即天竺也漢書曰張騫言使大夏時見蜀布卭竹杖問所從来曰從東來身毒國可数千里得蜀賈人市而爲昆明所閉天子欲伐之越嶲昆明國有溟池方三百里故作昆明池以􅁚之以習水戰因名曰昆明池漢書曰元狩三年减隴西北地上郡戍卒之半及吏弄法者謫之穿此池食貨志曰時越欲與漢用舩戰逐水􅀾相逐也乃大修昆明池也三輔舊事曰昆明池地三百三十二頃中有戈舩各數十樓舩百艘舩上建戈矛四角悉垂幡旄葆麾蓋照燭涯涘圖曰上林苑有昆明池周匝四十里廟記曰池中後作豫章大舩可載萬人上起宫室因欲遊戯養魚以給諸陵􅀕祀餘付長安厨三輔故事又曰池中有豫章䑓及石鯨刻石爲鯨魚長三丈每至雷雨常鳴吼鬛尾皆動一􅀃甘泉宫南有昆明池池中有靈波殿皆以桂爲殿柱風來自香又曰池中有龍首舩常令宫女泛舟池中張鳯蓋綉鳯爲飾建華旗作櫂􅁔櫂􅁔櫂發􅁔也又曰櫂􅁔謳舟人􅁔也雜以鼓吹帝御豫章觀臨觀焉􅀜輔古語曰昆明池中有二石人立牽牛織女於池之東西以􅁚天河張衡西京賦曰昆明靈沼黒水玄址牽牛立其右織女居其左今有石父石婆神祠在廢池疑此是也武帝初穿池得黒土帝問東方朔東方朔曰西域胡人知乃問胡人胡人曰刼燒之餘􅁅也三秦記曰昆明池中有靈沼名神池云堯時治水甞停舩於此池通白鹿原原人釣魚綸絶而去夢於武帝求去其鈎三日戯於池上見大魚㗸索帝曰豈不穀昨所夢邪乃取鈎放之間三日帝復遊池池濱得明珠一􅀟帝曰豈昔魚之報邪鎬池在昆明池之北即周之故都也廟記曰長安城西有鎬池在昆明池北周匝二十二里漑地三十三頃史記曰秦始皇帝三十六年使者從関東夜至華隂縣平舒道有人持璧遮使者曰爲吾遺鎬池君因言曰今年祖龍死使者問其故忽不見置其璧去使者奉璧具以聞始皇黙然良乆曰山􅀑不過知一歳事退言曰祖龍者人之先也祖始也龍者人主之􅁚謂始皇也使御府視璧乃二十八年渡江所沉璧也滄池在長安城中舊圖云未央宫有滄池言池水蒼色故曰滄池太液池在長安故城西建章宫北未央宫西南大液者言其津潤所及廣也関輔記云建章宫北有池以􅁚北海刻石爲鯨魚長三丈漢書曰建章宫北治大池名曰太液池中起三山以􅁚瀛洲蓬萊方丈刻金石爲魚龍竒禽異獸之属瀛洲一名䰟洲亦曰澴洲有樹名影木月中視之如列星万歳一實食之輕骨上有枝葉如華蓋群仙以避風雨有金銮之觀飾以環玉直上於雲中有青瑶瓦覆之以雲紈之素刻碧玉爲倒龍之狀懸火精爲日刻黒玉爲鳥以水精爲月青瑤爲蟾兎於地下爲機戾以側昏明不􅃜弦望有香風冷然而至有草名芸苗狀如菖蒲食葉則醉食根則醒有鳥如鳯身紺翼丹名曰藏珠毎鳴翔而吐珠累斛仙人以珠飾仙裳盖輕而耀於日月也蓬萊山亦名防丘亦名雲来高二万里廣七万里水淺有細石如金玉得之不加陶冶自然光淨仙者服之東有􅊊夷囯時有金霧諸仙􅀃北上常浮轉低卬有如山上架楼室向明以開户牖及霧歇烕户皆向北有浮雲之幹葉青莖紫子大如珠有青鵉集其上下有砂䃯細如粉柔風至葉條翻起拂細砂如雲霧仙者來觀而戯焉風吹竹葉声如鍾磬方丈之山一名峦維東方龍場方千里瑤玉爲林雲色皆紫上有通霞䑓西王母常遊於其上常有鵉鳯鼓舞如琴瑟和鳴三山統名崑丘亦曰神山上有不死之薬食之輕㪯武帝信仙道取少君栾大妄誕之語多起楼觀故他中立三山以􅁚蓬萊瀛洲方丈廟記曰建章宫北池名太液周囬十頃有採蓮女鳴鶴之舟又按三輔舊事云日出􅊙谷浴於咸池至虞淵即暮此池􅁚之也昭帝始元元年春黃鵠下建章宫太液池成帝常以秋日與趙飛燕戯於太液池以沙棠木爲舟沙棠木造舟不沉溺以雲母飾於鷁首一名雲舟又刻大桐木爲虬龍彫飾如眞夾雲舟而行以紫桂爲柁枻及觀雲棹之玩擷菱蕖帝毎憂輕蕩以驚飛燕命佽飛之士以金鎻䌫雲舟於波上毎輕風時至飛鷰殆欲隨風入水帝以翠縷結飛鷰之􅅂常恐曰妾微賤何復得預結纓􅅂之遊今太液池尚有避風䑓即飛燕結􅅂之處唐中池周回十二里在建章宫太液池之南百子池戚夫人侍兒賈佩蘭後出爲扶風人叚儒妻􅀃在宫内時見戚夫人侍髙祖甞以趙王如意爲言而髙祖思之幾半日不言歎息悽愴而未知其術使夫人擊筑髙祖􅁔大風以和之七月七日臨百子池作于闐樂樂闋以五色縷相覊謂之相連愛八月四日出彫房北户竹下圍棊勝者終年有福􅀒者終年疾病取絲縷就北斗星辰求長命乃免正月上辰出池邊盥濯食蓬餌以祓妖邪三月上巳張樂於池上十池上林􅁐有􅀄池麋池牛首池蒯池積草池東陂池西陂池當路池大䑓池郎池牛首池在上林苑中西頭蒯池生蒯草以織席西陂池郎池皆在古城南上林苑中陂郎二水名因爲池積草池中有􅃢瑚樹髙一丈二尺一本三柯上有四百六十二條南越王趙佗所獻號爲烽火樹至夜光景常煥然少府佽飛外池漢儀注佽飛具繒繳以射鳬鴈給􅀕祀故有池秦酒池在長安故城中廟記曰長樂宫中有魚池酒池池上有肉炙樹秦始皇造漢武行舟於池中酒池北起䑓天子於上觀牛飲者三千人又曰武帝作以夸羌胡飲以鐡盃重不能舉皆抵牛飲西征賦云酒池監於啇辛追覆車而不悟影蛾池武帝鑿池以翫月其旁起望鵠䑓以眺月影入池中使宫人乗舟弄月影名影蛾池亦曰眺蟾䑓琳池昭帝元始元年穿琳池廣千歩池南起桂䑓以望逺東引大液之水池中植分枝荷一莖四葉狀如駢蓋日照則葉低䕃根莖􅀂葵之衛足名曰低光荷實如玄珠可以飾佩花葉難萎芬馥之氣徹十餘里食之令人口氣常香益脉治病宫人貴之每遊燕出入必皆含嚼或剪以爲衣或折以障日以爲戯弄帝時命水嬉遊燕永日士人進一豆糟帝曰桂楫松舟其猶重朴况乎此槽可得而乗耶乃命以文梓爲船木蘭為柂刻飛燕翔鷁飾於船首隨風輕􅃞畢景忘歸起商䑓於池上鶴池在長安城西盤池在西北並廢氷池在長安西舊圖云西有彪池亦名聖女泉盖氷彪聲相近傳􅀃之訛也三輔黃圗卷第四
