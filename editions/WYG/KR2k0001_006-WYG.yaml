  hash: sha256:de07b5383874b2a32bd141d2655a9e8b01ea1b8fc2bed8195e27fc6848864163
body:
  text: 閣石渠閣蕭何造其下礲石為渠以導水若今御溝因為閣名所藏入關所得秦之圖籍至於成帝又於此藏秘書焉三輔故事曰石渠閣在未央宫殿北藏秘書之所天禄閣藏典籍之所漢宫殿疏云天禄麒麟閣蕭何造以藏秘書處賢才也劉向於成帝之末校書天禄閣専精覃思夜有老人著黄衣植青藜杖叩閣而進見向暗中獨坐誦書老父乃吹杖端煙然因以見向授五行洪範之文恐詞說繁廣忘之乃裂裳及紳以記其言至曙而去請問姓名云我是太乙之精天帝聞夘金之子有博學者下而觀焉乃出懐中竹牒有天文地圖之書曰余畧授子焉至子歆從授其術向亦不悟此人焉麒麟閣廟記云麒麟閣蕭何造漢書宣帝思股肱之美乃圖霍光等十一人於麒麟閣三秦記云未央宫有堯閣廟記云未央宫有白虎閣屬車閣署虎威章溝皆署名漢有長水中壘屯騎虎賁越騎步兵射聲胡騎八營宿衛王宫周廬直宿處庫武庫在未央宫蕭何造以藏兵器靈金内府太上皇微時佩一刀長三尺上有銘字難識傳云殷高宗伐鬼方時所作也上皇遊豐沛山中寓居窮谷有人冶鑄上皇息其旁問曰鑄何器工者笑曰為天子鑄劍慎勿言曰得公佩劍雜而治之即成神器可克定天下昴星精為輔佐木衰火盛此為異兆上皇解匕首投爐中劍成殺三牲以釁祭之工問何時得此上皇曰秦昭襄王時余行陌上一野人授余云是殷時靈物工即持劍授上皇上皇以賜高祖高祖佩之斬白蛇是也及定天下藏於寳庫守藏者見白氣如雲出戸狀若龍蛇吕后改庫曰靈金藏恵帝即位以此庫貯禁兵器名曰靈金内府倉太倉蕭何造在長安城外東南文景節儉太倉之粟紅腐而不可食細栁倉嘉倉在長安西渭水北古徼西有細栁倉城東有嘉倉廄未央大廄在長安故城中漢官儀曰未央宫六廄長樂承華等廄令皆秩六百石翠華廄大輅廄果馬廄騎馬廄大宛廄軏梁廄胡河廄騊駼廄皆在長安城外霸昌觀馬廄在長安城外都廄天子車馬所在中廄皇后車馬所在圈秦獸圈烈士𫝊云秦王召魏公子無忌不行使朱亥奉璧一雙詣秦秦王怒使置亥於獸圈中亥瞋目視獸眥血濺於獸靣獸不敢動漢獸圈九彘圈一在未央宫中文帝問上林尉及馮媛當熊皆此處獸圈上有樓觀橋横橋三輔舊事云秦造横橋漢承秦制廣六丈三百八十步置都水令以掌之號為石柱橋漢末董卓燒之渭橋秦始皇造渭橋重不能勝乃刻石作力士孟賁等像祭之乃可動今石人在渭橋在長安北三里跨渭水為橋霸橋在長安東跨水作橋漢人送客至此橋折栁贈别王莽時霸橋災數千人以水沃救不滅更霸橋為長存橋便門橋武帝建元二年初作橋在便門外跨渭水通茂陵長安城西門曰便門此橋與門對直因號便橋飲馬橋在宣平城門外陵墓漢諸陵先總屬太常令后依其地界屬三輔漢太上皇陵高帝葬太上皇於櫟陽北原因置萬年縣於櫟陽大城内以為奉陵邑其陵在東者太上皇西者昭靈后也高祖初居櫟陽故太上皇因在櫟陽十年太上皇崩葬北原高祖長陵在渭水北去長安城三十五里按高祖本紀十二年四月甲辰崩于長樂宫五月葬長陵長陵山東西廣一百二十步高十三丈長陵城周七里百八十步因為殿垣門四出及便殿掖庭諸官寺皆在中吕后陵在高祖陵東按史記外戚世家高后合葬長陵注云漢帝后同塋則為合葬不合陵也恵帝安陵去長陵十里按本紀恵帝七年八月戊寅崩于未央宫葬安陵在長安城北三十五里安陵有果園鹿苑云文帝霸陵在長安城東七十里因山為藏不復起墳就其水名因以為陵號景帝陽陵在長安城東北四十五里按景帝五年作陽陵起邑陽陵山方百二十步高十丈武帝茂陵在長安城西北八十里建元二年初置茂陵邑武帝自作陵也本槐里縣之茂鄉故曰茂陵周囘三里三輔舊事云武帝於槐里茂鄉徙戸一萬六千置茂陵高一十四丈一百步茂陵園有鶴觀戸一萬六千一本作六萬一千昭帝平陵在長安西北七十里去茂陵十里帝初作夀陵令流水而已石槨廣一丈二尺長二丈五尺無得起墳陵東北作廡長三丈五步外為小厨裁足祠祝萬年之後掃地而祭宣帝杜陵在長安城南帝在民間時好遊鄠杜間故葬此元帝渭陵在長安北五十六里成帝延陵在扶風去長安六十二里一曰成帝於霸陵北步昌亭起夀陵即武帝之廢陵也王莽時遣使壊渭陵延陵園門罘罳曰毋使民復思也又以墨色洿其周垣哀帝義陵在扶風渭城西北原上去長安四十六里平帝康陵在長安北六十里興平原口文帝母薄姬南陵在霸陵南故曰南陵即今所謂薄陵也昭帝母趙婕妤雲陵在雲陽甘泉宫南今人呼為女陵李夫人墓東西五十步南北六十步高八丈在茂陵西北一里俗名英陵亦云集仙臺一曰高三十丈周囘三百六十步王莽妻死葬渭陵長夀園偽諡曰孝穆皇后僣號億年陵舊本云億年陵王莽妻死諡曰孝穆皇后葬渭城長夀園西陵曰億年雜録漢宫中謂之禁中謂宫中門閣有禁非侍衛通籍之臣不得妄入通籍謂記名於門通出入禁門也籍者謂三尺竹牒記其年紀名字物色縣宫門案省相應乃得入行道豹尾中亦視禁中謂天子出行道中則有儀衛豹尾至孝元皇后父名禁避之改曰省中省察也言出入禁中皆當省察不可妄也鹵簿天子出車駕次第謂之鹵簿有大駕有法駕有小駕大駕則公卿奉引大將軍叅乘太僕御屬車八十一乘古者諸侯二車九乘秦滅六國兼其車服漢依秦制故大駕八十一乘屬者言相聯屬不絶也作三行尚書御史乘之備千乘萬騎出長安出祠天於甘泉備之百官有其儀注名曰甘泉鹵簿法駕京兆尹奉引侍中叅乘奉車郎御屬車三十六乘北郊眀堂則省副車小車祠宗廟用之清道謂天子將出或有齋祠先令道路掃灑清淨靜室天子出入警蹕舊典行幸所至必遣靜室令先按行清淨殿中以虞非常蔡邕獨斷曰天子所至曰幸幸者宜幸也世俗謂車駕至所臣民被其澤以僥倖故曰幸也離宫天子出遊之宫也行在所天子以四海為家不以京師宫室居處為常則當乘車輿以行天下天子至尊臣下不敢渫瀆言之故托之於乘輿或謂之車駕車輿所至奏事皆曰行在陛下陛所由陞堂也天子必有近臣執兵階陛以戒不虞臣下與天子言不敢指斥天子故呼在殿陛下以告之故稱陛下因卑達尊之意也上書亦如之如羣臣士庶相與語曰閣下足下之屬繭館漢宫闕疏云上林苑有繭館盖蠶繭之所也蠶室行腐刑之所也司馬遷下蠶室鍾室在長樂宫高祖縛韓信置鍾室中作室上方工作之所長安御溝謂之楊溝謂植高楊於其上也闕觀也周置兩觀以表宫門其上可居登之可以逺觀故謂之觀人臣將朝至此則思其所闕塾門舍也臣來朝君至門外當就舍更熟詳所應對之事塾之言熟掖門在兩傍如人臂掖也闈闥宫中小門也永巷永長也宫中之長巷幽閉宫女之有罪者武帝時改為掖庭置獄焉列女傳周宣王姜后脫簪珥待罪永巷蠻夷邸在長安城内藳街藳街街名蠻夷邸在此街若今鴻臚館闗中八水皆出入上林苑霸水出藍田谷西北入渭滻水亦出藍田谷北至霸陵入霸涇水出安定涇陽开頭山東至陽陵入渭渭水出隴西首陽縣鳥鼠同穴山東北至華隂入河豐水出鄠南山豐谷北入渭鎬水在昆眀池北牢水出鄠縣西南入潦谷北流入渭潏水在杜陵從皇子陂西北流經昆眀池入渭三輔黄圖卷六
