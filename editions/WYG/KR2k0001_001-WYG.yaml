front:
  text: 革禹貢九州舜置十二牧雍其一也古豐鎬之地平王東遷以岐豐之地賜秦襄公至孝公始都咸陽秦孝公十二年於渭北作咸陽徙都之咸陽在九􅉄山渭水北山水俱在南故名咸陽秦并天下置内史以領闗中項籍滅秦分其地為三以章邯為雍王都廢丘今興平縣地司馬忻為塞王都櫟陽董翳為翟王都髙奴今延川金明縣謂之三秦漢髙祖入闗定三秦元年更為渭南郡九年罷郡復為内史五年髙帝在洛陽婁敬説曰夫秦地被山帶河四塞以為固卒然有急百萬衆可立具因秦之故資甚美膏腴之地此所謂天府陛下入闗而都之山東雖亂秦故地可全而有也又田肯賀髙帝曰陛下治秦中秦形勢之國帶河阻山持㦸百萬秦得百二焉地勢便利其以下兵於諸侯猶居髙屋之上建瓴水也自是漢始都之景帝分置左右内史此為右内史武帝太初元年改内史為京兆尹與左馮翊右扶風謂之三輔其輔俱在長安古城中
  hash: sha256:c4626c9152b532c8cd3f75db82747c7af77d92971567db3a9ac91ce48b7e16d7
