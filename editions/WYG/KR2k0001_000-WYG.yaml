body:
  text: 三輔黄圖地理𩔖一宮殿簿之屬提要臣等謹案三輔黄圖六卷不著撰人名氏晁公武讀書志據所引劉昭續漢志注定為梁陳間人作程大昌雍録則謂晉灼所引黄圖多不見於今本而今本漸臺滄池髙廟元始祭社稷儀皆明引舊圖知非晉灼之所見又據改槐里為興平事在至徳二載知為唐肅宗以後人作其説較公武為有據此本惟髙廟一條不引舊圖氷池一條引舊圖而大昌未及其餘三條並同葢即大昌所見之本偶誤氷池為髙廟也其書皆記長安古迹間及周代靈臺靈囿諸事然以漢為主亦間及河間日華宫梁曜華宫諸事而以京師為主故稱三輔黄圖三輔者顔師古謂長安以東為京兆長陵以北為左馮翊渭城以西為右扶風也所紀宫殿苑囿之制條分縷析至為詳備考古者恒所取資惟兼采西京雜記漢武故事諸偽書洞冥記拾遺記諸雜説愛博嗜奇轉失精核不免為白璧㣲瑕耳乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀三輔黄圖原序易曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨葢取諸大壯三代盛時未聞宫室過制秦穆公居西秦以境地多良材始大宫觀戎使由余適秦穆公示以宫觀由余曰使鬼為之則勞神矣使人為之則苦人矣是則穆公時秦之宫室已壯大矣恵文王初都咸陽取岐雍巨材新作宫室南臨渭北踰涇至於離宫三百復起阿房未成而亡始皇并滅六國慿藉富强益為驕侈殫天下財力以事營繕項羽入闗燒宫闕三月火不滅漢髙祖有天下始都長安實曰西京欲其子孫長安都於此也長安本秦之鄉名髙祖作都至孝武皇帝承文景菲薄之餘恃邦國阜繁之資土木之役倍秦越舊斤斧之聲畚鍤之勞嵗月不息葢騁其邪心以誇天下也昔孔子作春秋築一臺新一門必書於經謹其廢農時奪民力也今裒采秦漢以來宫殿門闕樓觀池苑在闗輔者著於篇曰三輔黄圖云東都不與焉欽定四庫全書三輔黄圖卷一三輔沿
  hash: sha256:6856a3454f8eb438928170deb2801c88a0649de5736923036be9e8657ce952cf
