body:
  text: 三輔黄圖卷四欽定四庫全書三輔黄圖卷五臺榭周文王靈臺在長安西北四十里詩序曰靈臺民始附也文王受命而人樂其有靈徳以及鳥獸昆蟲焉鄭𤣥注云天子有靈臺者所以觀祲象察氛祥也文王受命而作邑于豐立靈臺詩曰經始靈臺庶民子來經之營之不日成之劉向新序云周文王作靈臺及為池沼掘得死人之骨吏以聞于文王文王曰更葬之吏曰此無主矣文王曰有天下者天下之主有一國者一國之主寡人者死人之主又何求主遂令吏以衣棺更葬之天下聞之皆曰文王賢矣澤及枯骨又况於人乎周靈臺高二丈周囘百二十步漢靈臺在長安西北八里漢始曰清臺本為候者觀隂陽天文之變更名曰靈臺郭延生述征記曰長安宫南有靈臺高十五仞上有渾儀張衡所制又有相風銅烏遇風乃動一曰長安靈臺上有相風銅烏千里風至此烏乃動又有銅表高八尺長一丈三尺廣尺二寸題云太初四年造栢梁臺武帝元鼎二年春起此臺在長安城中北闕内三輔舊事云以香栢為梁也帝嘗置酒其上詔羣臣和詩能七言詩者乃得上太初中臺灾漸臺在未央宫太液池中高十丈漸浸也言為池水所漸又一說漸臺星名法星以為臺名未央宫有倉池池中有漸臺王莽死於此神眀臺見建章宫通天臺武帝元封二年作甘泉通天臺漢舊儀云通天者言此臺高通于天也漢武故事築通天臺於甘泉去地百餘丈望雲雨悉在其下望見長安城武帝時祭泰乙上通天臺舞八嵗童女三百人祠祀招仙人祭泰乙云令人升通天臺以候天神天神既下祭所若大流星乃舉烽火而就竹宮望拜上有承露盤仙人掌擎玉杯以承雲表之露元鳳間自毁椽桷皆化為龍鳳從風雨飛去西京賦云通天眇而竦峙徑百常而莖擢上瓣華以交紛下刻陗其若削亦曰候神臺又曰望仙臺以候神眀望神仙也涼風臺在長安故城西建章宫北關輔記曰建章宫北作涼風臺積水為樓長樂宫有魚池臺酒池臺秦始皇造又有著室臺鬬雞臺走狗臺壇臺漢韓信射臺又未央宫有果臺東西山二臺未央宫有鈎弋臺通靈臺見宫門望鵠臺眺蟾臺桂臺商臺避風臺并見池沼門長楊榭在長楊宫秋冬較獵其下命武士搏射禽獸天子登此以觀焉臺上有木曰榭辟廱周文王辟廱在長安西北四十里亦曰璧廱如璧之圓雍之以水象教化流行也詩云於論鼔鐘於樂辟廱毛萇注云論思也水旋丘如辟廱以節觀者鄭𤣥注云文王作靈臺而知人之歸附作靈沼靈囿而知鳥獸之得其所以為音聲之道與政通故合樂以詳之漢辟廱在長安西北七里漢書河間獻王來朝獻雅樂武帝對之三雍宫即此禮樂志曰成帝時犍為郡水濱得古磬十六枚劉向說帝宜興辟廱焉眀堂周眀堂眀堂所以正四時出教化天子布政之宫也黄帝曰合宫堯曰衢室舜曰總章夏后曰世室殷人曰陽館周人曰眀堂先儒舊說其制不同或曰眀堂在國之陽大戴禮云眀堂九室一室有四戸八牖凡三十六戸七十二牖以茅盖屋上圓下方援神契曰眀堂上圓下方八窓四牖考工記云眀堂五室稱九室者取象陽數也八牖者隂數也取象八風三十六戸牖取六甲之文六六三十六也上圓象天下方法地八窓即八牖也四闥者象四時四方也五室者象五行也皆無眀文先儒以意釋之耳禮記眀堂位曰朝諸侯于眀堂之位天子負斧扆南鄉而立眀堂也者眀諸侯之尊卑也制禮作樂頒度量而天下服知眀堂是布政之宫也又孝經曰宗祀文王於眀堂以配上帝則周有眀堂也眀矣漢眀堂在長安西南七里漢書曰武帝初即位嚮儒術以文學為本議立眀堂於城南以朝諸侯應劭注云漢武帝造眀堂王莽修飾令大漢書武帝建元元年議立眀堂遣使者安車蒲輪束帛加璧徵魯申公又郊祀志初天子封泰山泰山東北阯古時有眀堂處處險不敞上欲治眀堂奉高帝未曉其制度濟南人公玉帶上黄帝時眀堂圖眀堂中有一殿四靣無壁以茅盖通水水圜宫垣為複道上有樓從西南入名曰崑崙天子從之入以拜祀上帝焉於是上令奉高作眀堂汶上如帶圖及是嵗修東封則祀太乙五帝於眀堂上坐合高皇帝祠坐對之祠后土於下房以二十太牢天子從崑崙道入始拜眀堂如郊禮是嵗元豐五年也本紀元豐二年秋作眀堂于泰山下五年春三月至泰山増封甲子祠高祖于眀堂以配上帝太初元年冬十月行幸泰山十一月甲子朔旦冬至祀上帝於眀堂圜丘漢圜丘在昆明故渠南有漢故圜丘今按高二丈周囘百二十步太學漢太學在長安西北七里董仲舒䇿曰太學賢士之關教化之本原也王莽作宰衡時建弟子舍萬區起市郭上林苑中三輔舊事云漢太學中有市有獄宗廟宗尊也廟貌也所以髣髴先人尊貌也漢立四廟祖宗廟異處不序昭穆太上皇廟在長安西北長安故城中香室街南鴻翔府北關輔記曰在酒池北高祖廟在長安西北故城中關輔記曰秦廟中鍾四枚皆在漢高祖廟中三輔舊事云高廟鍾重十二萬斤漢舊儀云高祖廟鍾十枚各受十石撞之聲聞百里漢書文帝時盜取高廟玉環故事又云光武至長安宫闕以宗廟燒蕩為墟乃徙都洛陽取十廟合於高廟作十二室太常卿一人别治長安主知高廟事高廟有便殿凡言便殿便室便坐者皆非正大之處所以就便安也高園於陵上作之既有正寢以象平生正殿路寢也又立便殿於寢側以象休息閒宴之處也孝恵更於渭北建高帝廟謂之原廟恵帝廟在高帝廟後文帝廟號顧成廟孝文四年作顧成廟在長安城南文帝自為廟制度逼狹若顧望而成猶文王靈臺不日成之故曰顧成也景帝廟號徳陽宫景帝中四年造徳陽宫盖帝自作之諱不言廟故號為宫故事云景帝造徳陽宫武帝廟號龍淵今長安西茂陵東有其處作銅飛龍故以冠名武帝元光四年河決濮陽𤼵卒十萬救河決起龍淵之宫取此為名武帝廟不言宫昭帝廟號徘徊宣帝廟號樂遊在杜陵西北神爵三年宣帝立廟於曲池之北號樂遊按其處則今呼樂遊闕是也因樂遊苑得名元帝廟號長夀成帝廟號陽池太上皇高祖父也有寢廟園原廟昭靈后高祖母也武哀王高祖兄也昭哀后高祖嫂也皆有園孝恵皇帝有寢廟園孝文太后孝昭太后皆有寢園衛思后戾太子母皇祖悼考皆有廟園宣帝父史皇孫廟曰奉眀元成之世祖宗廟在郡國者六十八合百六十七所京師自高祖至宣帝與太上皇悼皇考各自居陵旁立廟并為百七十六又園中各有寢便殿日祭於寢月祭於殿時祭於便殿寢日四上食廟嵗二十五祠便殿四嵗祠又月一遊衣冠四時祭宗廟用大牢列侯皆獻酎金以助祭諸侯王及列侯嵗時詣京師侍祠助祭漢儀諸侯王嵗以戸口酎黄金於漢廟皇帝臨受獻金金不如斤兩色惡王削縣侯免國注云因八月嘗酎㑹諸侯廟中出金助祭謂之酎金酎正月旦作酒八月成三重釀醇酒也味厚故以薦宗廟金黄金也不如法者奪爵又冊封諸王必於祖廟冊命之示不敢専也武帝元狩六年夏四月乙巳立皇子閎為齊王旦燕王胥廣陵王於廟中寄命漢制封皇子為王者其實古諸侯也周末諸侯或稱王而漢天子自以皇帝為稱故以王號加之總名為諸侯王新莽壊徹城西苑中建章承光包陽大臺儲元宫及平樂當路陽禄館凡十餘所取其材瓦以起九廟莽曰予卜波水之北郎池之南惟玉食予又卜金水之南眀堂之西亦惟玉食予將親築於是遂營長安城南提封百頃莽又親舉築三下九廟一黄帝二虞帝三陳胡王四齊敬王五濟北愍王六濟南悼王七元成孺王八陽平頃王九新都顯王殿皆重屋太初祖廟東西南北各四十丈高十七丈餘廟半之為銅欂櫨飾以金銀琱文窮極百工之巧帶高増下功費數百鉅萬卒徒死者數萬南北郊天郊在長安城南地郊在長安城北所屬掌冶壇墠郊宫嵗時供張以奉郊祀武帝定郊祀之事祠太乙於甘泉圜丘取象天形就陽位也祀后土於汾隂澤中方丘取象地形就隂位也至成帝徙泰畤后土于京師始祀上帝於長安南郊祀后土於長安北郊社稷漢初除秦社稷立漢社稷其後又立官社配以夏禹而不立官稷至平帝元始三年始立官稷於官社之後後漢祭祀志云黄圖載元始儀甚悉今本無合入元始四年宰衡莽奏曰帝天之義莫大於承天承天之序莫重於郊祀祭天於南就陽位祀地於北就隂位圜丘象天方澤象地圓方因體南北從位燔燎升氣瘞埋就𩔖牲欲繭栗味尚清𤣥器成匏勺貴誠因質天地神所統故𩔖乎上帝禋于六宗望秩山川班於羣神皇天后土随玉所在而事佑焉甘泉太隂河東少陽咸失厥位不合禮制聖王之制必上當天心下合地意中攷人事故曰豈弟君子求福不囘囘而求福厥路不通在易泰卦乾坤合體天地交通萬物聚出其律太簇天子親郊天地先祖配天先妣配地隂陽之别以日冬至祀天夏至祀后土君不省方而使有司六宗日月星山川海星則北辰川即河山岱宗三光衆眀山阜百川衆流渟汙臯澤以𩔖相屬各數秩望相序於是定郊祀長安南北郊罷甘泉河東祀觀漢博士劉熈釋名曰觀觀也於上觀望也豫章觀武帝造在昆眀池中亦曰昆眀觀又一說曰上林苑中有昆眀池觀盖武帝所置桓譚新論云元帝被疾逺求方士漢中送道士王仲都詔問所能對曰能忍寒乃以隆冬盛寒日令袒載駟馬於上林昆眀池上環以氷而御駟者厚之狐裘寒戰而仲都無變色臥於池上曛然自若即此也飛廉觀在上林武帝元封二年作飛廉神禽能致風氣者身似鹿頭如雀有角而蛇尾文如豹武帝命以銅鑄置觀上因以為名班固漢武故事曰公孫卿言神人見於東萊山欲見天子上於是幸緱氏登東萊留數日無所見惟見大人跡上怒公孫卿之無應卿懼誅乃因衛青白上云仙人可見而上往遽以故不相值今陛下可為觀於緱氏則神人可致且仙人好樓居不極高顯神終不降也於是上於長安作飛廉觀高四十丈於甘泉作延夀觀亦如之後漢眀帝永平五年至長安悉取飛廉并銅馬置之西門外為平樂觀董卓悉銷以為錢屬玉觀在扶風屬玉水鳥似鵁鶄以名觀也又曰屬玉似鴨而大長頸赤目紫紺色宣帝甘露二年十二月行幸萯陽宫屬玉觀青梧觀在五柞宫之西觀亦有三梧桐樹下有石麒麟二枚刋其脇文字是秦始皇驪山墓上物也頭高一丈三尺東邉者前左脚折處有赤如血父老謂其有神皆含血屬筋焉射熊觀在長楊宫武帝好自擊熊司馬相如從至上林作賦諫揚雄亦作長楊賦石闕觀封巒觀雲陽宫記云宫東北有石門山岡巒糾紛干霄秀出有石巖容數百人上起甘泉觀甘泉賦云封巒石闕弭迤乎延屬白楊觀在昆眀池東長平觀在池陽宫臨涇水龍臺觀在豐水西北近渭涿木觀在上林苑細栁觀在長安西北三輔舊事云漢文帝大將軍周亞夫軍於細栁今呼古徼是也成山觀成王在東萊不夜縣於其上築宫闕以為觀成山觀不在三輔例見宫室門仙人觀霸昌觀蘭池觀安臺觀淪沮觀在城外又有禁觀董賢觀蒼龍觀當市觀旗亭樓馬伯騫樓在城内麒麟朱雀龍興含章皆館名三輔黃圖卷五欽定四庫全書三輔黄圖卷
